  summary: "两只暗眼睛构成的猫头鹰之脸。"
  summaryEn: "Planetary nebula whose two dark patches form an owl's face."
  description: "猫头鹰星云距地球约 2030 光年,位于大熊座北斗七星附近,因内部两个对称的暗区形似猫头鹰的双眼而得名。它是一个面状的行星状星云,直径约三光年,由一颗垂死恒星抛出的气壳构成,年龄约八千年。主体呈青绿色的氧光,外围还有一层暗淡的红色氢晕,中心是一颗逐渐冷却的白矮星。它视星等约 9.9 等,表面亮度低,目视较为暗淡。它适合长焦窄带长曝,以拍出标志性的「双眼」结构,是春季大熊座的经典行星状星云。"
  descriptionEn: "The Owl Nebula lies about 2,030 light-years away in Ursa Major, near the Big Dipper, named for two symmetric dark patches that resemble an owl's eyes. It is a face-on planetary nebula about three light-years across, formed from gas shed by a dying star roughly 8,000 years ago. Its body glows teal from oxygen, ringed by a faint red hydrogen halo, with a cooling white dwarf at its center. At magnitude 9.9 its low surface brightness makes it faint visually. It suits long narrowband exposures to bring out the signature 'eyes,' a classic spring planetary nebula in Ursa Major."
  focal: "长焦 1500mm+"
  image: m97-owl
