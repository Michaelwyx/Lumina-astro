  season: spring
  difficulty: advanced
  summary: "狮子三重奏成员,近侧向的优雅旋涡。"
  summaryEn: "A near-edge-on spiral and member of the Leo Triplet."
  description: "M65 距地球约 3500 万光年,位于狮子座,是著名的「狮子三重奏」星系群成员之一。它呈近乎侧向的细长旋涡形态,盘面一侧有一道清晰的暗尘带勾勒出旋臂边缘,核球呈温暖的黄色,显示其恒星以年老恒星为主。相比受到潮汐扰动、形态略显凌乱的邻居 M66,M65 结构平整规整,恒星形成相对宁静。它与 M66、汉堡星系 NGC 3628 三者同框,构成春季星系摄影的招牌画面。它表面亮度偏低,适合用长焦镜头配合较暗的天空长曝拍摄。"
  descriptionEn: "M65 lies about 35 million light-years away in Leo and is one of the members of the famous 「Leo Triplet」 galaxy group. It appears as a slender, near-edge-on spiral, with a clear dust lane tracing one side of the disk and a warm yellow core that reflects its older stellar population. Compared with its tidally disturbed, somewhat messy neighbor M66, M65 is smooth and orderly with relatively quiet star formation. Framed together with M66 and the Hamburger Galaxy (NGC 3628), it forms a signature spring galaxy composition. Its modest surface brightness rewards a long focal length and long exposures under dark skies."
  focal: "长焦 1000mm+"
  image: leo-triplet
