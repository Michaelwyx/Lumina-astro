  summary: "最亮塞弗特星系,核心异常明亮活跃。"
  summaryEn: "The brightest, archetypal Seyfert galaxy with a fiercely active nucleus."
  description: "M77(NGC 1068)距地球约 4700 万光年,位于鲸鱼座,是最亮、最著名的塞弗特活动星系核星系之一,也是 II 型塞弗特星系的原型。它中心藏有一个被尘埃环遮蔽的超大质量黑洞,正剧烈吞噬物质并向外辐射强烈能量;2022 年中微子天文台 IceCube 还从其核心探测到高能中微子,进一步证实了活跃核区的剧烈活动。它紧凑明亮的核球外围环绕着布满恒星形成区的旋臂,直径约 17 万光年,属于最大的梅西耶星系之一。长焦拍摄能展现明亮核心与缠绕旋臂的鲜明对比。"
  descriptionEn: "M77 (NGC 1068) lies about 47 million light-years away in Cetus and is one of the brightest and most famous Seyfert active galactic nuclei, the prototype of the Type II Seyfert class. Its core hosts a supermassive black hole shrouded by a torus of dust, voraciously accreting matter and radiating enormous energy; in 2022 the IceCube observatory even detected high-energy neutrinos from its center, confirming the violent activity within. A compact, bright bulge is surrounded by spiral arms peppered with star-forming regions, and at roughly 170,000 light-years across it ranks among the largest Messier galaxies. Long-focal imaging brings out the sharp contrast between the brilliant core and the winding arms."
  focal: "长焦 1000mm+"
  image: m77
