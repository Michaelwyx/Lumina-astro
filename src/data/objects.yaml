  description: "NGC 5907 距地球约 5000 万光年,是一个极其纤薄的侧向旋涡星系,因细长锐利的外形被称为「裂片」或「刀刃」星系。它几乎完美地侧向我们,中央贯穿一条笔直的暗尘带。极深曝光揭示出环绕星系的巨大恒星潮汐环流,那是被瓦解的矮星系遗迹,是高阶玩家追求的极限暗弱细节。"
  descriptionEn: "NGC 5907 lies about 50 million light-years away and is an extremely thin edge-on spiral, nicknamed the Splinter or Knife Edge Galaxy for its slender, razor-sharp profile. It presents almost perfectly edge-on, bisected by a straight dark dust lane. Very deep exposures reveal enormous looping stellar tidal streams around it, the shredded remains of a dwarf galaxy, a prized faint detail for advanced imagers."
  focal: "长焦 1000–2000mm"
