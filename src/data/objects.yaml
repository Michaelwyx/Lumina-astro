  description: "对虾星云距地球约 6000 光年,位于天蝎座尾部附近,是一片直径约 250 光年的巨大红色发射星云,因形似一只对虾而得名。它富含氢气,被内部年轻星团电离发光,夹杂众多暗尘埃带。位于银河浓密区,常与周边疏散星团同框,适合宽视场窄带拍摄。"
  descriptionEn: "Roughly 6,000 light-years away near the tail of Scorpius, the Prawn Nebula is a vast red emission cloud some 250 light-years across, named for its shrimp-like shape. Rich in hydrogen and ionized by embedded young clusters, it is threaded with dark dust lanes. Set in a dense Milky Way field, it pairs well with nearby open clusters for wide-field narrowband work."
