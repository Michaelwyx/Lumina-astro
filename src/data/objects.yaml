  summary: "室女团中精致倾斜的宏伟旋涡。"
  summaryEn: "An elegant inclined grand-design spiral in the Virgo Cluster."
  description: "M88 距地球约 5000 万光年,位于后发座,是室女座星系团中最美的旋涡星系之一,呈优雅的倾斜角度。它的多条对称缠绕的旋臂上布满清晰的尘埃带与粉红色恒星形成区,核球明亮紧凑。它是一个塞弗特星系,核心藏有活动的超大质量黑洞。它正以高速冲入室女团的炽热团内介质,前缘气体因此被剥离,显示出星系与团环境相互作用的痕迹。长焦拍摄下旋臂层次丰富、纹理细腻,是后发座春季星系群中颇受欢迎的亮点。"
  descriptionEn: "M88 lies about 50 million light-years away in Coma Berenices and is one of the most beautiful spiral galaxies in the Virgo Cluster, seen at an elegant inclination. Its many symmetric, tightly wound arms are lined with clear dust lanes and pink star-forming regions around a bright, compact bulge. It is a Seyfert galaxy with an active supermassive black hole at its core. Plunging at high speed into the cluster's hot intracluster medium, its leading gas is being stripped, a visible sign of galaxy-cluster interaction. Under long focal lengths it shows rich, finely textured arms, a popular highlight of the spring Coma galaxy fields."
  focal: "长焦 1000mm+"
  image: ngc4038b
