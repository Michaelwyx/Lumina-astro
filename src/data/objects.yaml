  difficulty: intermediate
  summary: "室女团巨椭圆,首张黑洞照片主角。"
  summaryEn: "A giant elliptical and the subject of the first-ever black hole image."
  description: "M87(NGC 4486)距地球约 5300 万光年,位于室女座星系团中心,是一个超巨型椭圆星系,质量惊人,拥有上万个球状星团——远超银河系的数百个。它核心的超大质量黑洞质量约为太阳的 65 亿倍,射出一道长达约 5000 光年、由相对论性等离子体构成的蓝色喷流,这是早在 1918 年就被发现的著名特征。2019 年事件视界望远镜(EHT)正是以这个黑洞拍下了人类首张黑洞照片。长焦深曝能捕捉到那道著名的蓝色喷流,是室女团中最具科学传奇色彩的目标。"
  descriptionEn: "M87 (NGC 4486) lies about 53 million light-years away at the heart of the Virgo Cluster and is a supergiant elliptical galaxy of staggering mass, hosting over ten thousand globular clusters, far more than the Milky Way's few hundred. Its central supermassive black hole weighs about 6.5 billion solar masses and launches a blue relativistic-plasma jet roughly 5,000 light-years long, a famous feature noted as early as 1918. In 2019 the Event Horizon Telescope used this black hole to capture humanity's first-ever image of a black hole. Long-focal deep exposures can record that famous blue jet, making it the most scientifically legendary target in the Virgo Cluster."
  focal: "长焦 1000mm+"
  image: ngc4486
