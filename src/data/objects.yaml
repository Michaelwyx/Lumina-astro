  difficulty: intermediate
  summary: "离地最近的「上帝之眼」行星状星云。"
  summaryEn: "The nearest bright planetary nebula, the eye-like \"Eye of God.\""
  description: "螺旋星云(NGC 7293,Caldwell 63)距地球仅约 650 光年,位于宝瓶座,是离我们最近的明亮行星状星云之一,因酷似一只巨大的眼睛而被称为「上帝之眼」。它视面接近满月大小,是一颗类太阳恒星走向终点时抛出的气壳。蓝绿色的氧 III 内盘与红色的氢、氮外缘层层环绕,内壁还密布着数千个朝向中央白矮星的「彗状结」(cometary knots),每个都比太阳系还大,极具科学价值。因离我们近且视面大,中长焦即可拍出宏伟全貌与丰富细节,是秋季南天最上镜的行星状星云。"
  descriptionEn: "The Helix Nebula (NGC 7293, Caldwell 63) lies only about 650 light-years away in Aquarius and is one of the nearest bright planetary nebulae, nicknamed the \"Eye of God\" for its resemblance to a giant eye. Spanning nearly the size of the full moon, it is the gas shell cast off by a Sun-like star reaching its end. A teal O III inner disk is ringed by layers of red hydrogen and nitrogen, and its inner walls bristle with thousands of \"cometary knots\" pointing toward the central white dwarf, each larger than our solar system and of great scientific interest. Being close and large on the sky, it reveals its grand form and rich detail even at medium-to-long focal lengths, the most photogenic planetary nebula of the southern autumn."
  focal: "中长焦 800–1200mm"
  image: ngc7293
