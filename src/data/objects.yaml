  summary: "室女团中最亮的巨椭圆星系。"
  summaryEn: "The brightest giant elliptical galaxy in the Virgo Cluster."
  description: "M49(NGC 4472)距地球约 5600 万光年,是室女座星系团中最亮的成员,一个巨型椭圆星系,也是该团的主导星系之一。它质量惊人,拥有约六千个球状星团,远多于银河系。外形虽呈平滑无结构的金黄色光斑,但极为明亮硕大,是 1771 年梅西耶最早收录的椭圆星系。它身旁伴有一个正被其引力撕扯的矮星系,中心还藏有超大质量黑洞。M49 常作为室女团星系巡礼的锚点,周围散布众多更小的星系,是春季长焦深空摄影的标志性目标。"
  descriptionEn: "M49 (NGC 4472) lies about 56 million light-years away and is the brightest member of the Virgo Cluster, a giant elliptical and one of the cluster's dominant galaxies. Remarkably massive, it hosts roughly 6,000 globular clusters, far more than the Milky Way. Though it appears as a smooth, featureless golden glow, it is extremely bright and large, and was the first elliptical galaxy Messier cataloged, in 1771. A dwarf galaxy being tidally disrupted lies beside it, and a supermassive black hole lurks at its core. M49 often serves as an anchor for tours of the Virgo Cluster, surrounded by many smaller galaxies, making it a landmark long-focal deep-sky target in spring."
  focal: "长焦 1000mm+"
  image: m49
- id: M51
  name: "涡状星系"
  nameEn: "Whirlpool Galaxy"
  catalog: Messier
  type: galaxy
  typeLabel: "旋涡星系"
  constellation: "猎犬座 CVn"
  ra: "13h30m"
  dec: 47
  decLabel: "+47°"
  magnitude: 8.4
  hemisphere: north
  season: spring
  difficulty: intermediate
  summary: "经典正面旋涡,正吞噬一个小伴星系。"
  summaryEn: "The classic face-on grand-design spiral interacting with companion NGC 5195."
  description: "涡状星系距地球约 2300 万光年,位于猎犬座,是最著名的面朝我们的「宏伟设计」旋涡星系。它规整明亮的旋臂正与小伴星系 NGC 5195 发生引力相互作用,后者从其旋臂后方穿过,留下一条连接二者的恒星与气体桥——正是这场近距离邂逅激发并强化了 M51 壮丽的双臂结构。旋臂上点缀着粉红色 H II 区和蓝色年轻星团,是恒星诞生活跃的标志。它是 1845 年罗斯勋爵首次辨认出旋涡结构的星系,在天文史上意义非凡。长焦深曝下旋臂细节与潮汐桥极为丰富,是星系摄影的标志性目标。"
  descriptionEn: "The Whirlpool Galaxy lies about 23 million light-years away in Canes Venatici and is the most famous face-on 「grand-design」 spiral. Its bright, orderly arms are gravitationally interacting with the small companion NGC 5195, which is passing behind one arm and leaving a bridge of stars and gas connecting the two—this close encounter is what triggered and amplified M51's magnificent two-arm structure. The arms are studded with pink H II regions and blue young clusters, signatures of active star birth. It was the first galaxy in which spiral structure was recognized, by Lord Rosse in 1845, giving it great historical significance. Deep long-focus imaging reveals abundant arm detail and the tidal bridge, making it an iconic galaxy target."
  focal: "长焦 1000mm+"
  image: m51-whirlpool
