  summary: "暗尘分割的橙红「火焰」。"
  summaryEn: "Orange-red 'flame' split by dark dust beside Alnitak."
  description: "火焰星云距地球约 1400 光年,紧邻猎户腰带的左端亮星参宿一(Alnitak)。明亮的橙红色氢气被前景一道分叉的暗尘带切割,使整体看上去像一团跳动的火焰,因而得名。参宿一发出的强紫外辐射电离了背后的气体,使其持续发光。星云内部隐藏着一个被尘埃遮蔽的年轻星团,在红外波段可见数百颗新生恒星。它常与马头星云组成猎户座经典的双星云构图,是冬季中长焦拍摄的热门对象。"
  descriptionEn: "The Flame Nebula lies about 1,400 light-years away, right next to Alnitak, the easternmost belt star of Orion. Its bright orange-red hydrogen is cut by a forking dark dust lane, giving it the look of dancing flames. Intense ultraviolet radiation from Alnitak ionizes the gas behind it, keeping it aglow. Hidden within is a dust-shrouded young star cluster, with hundreds of newborn stars visible in the infrared. Often paired with the Horsehead Nebula in a classic Orion two-nebula composition, it is a popular winter target at medium-to-long focal lengths."
  focal: "中长焦 800–1200mm"
  image: flame-nebula
