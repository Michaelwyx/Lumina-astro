  summary: "南十字旁最显眼的暗星云。"
  summaryEn: "The most prominent dark nebula in the southern sky, beside the Southern Cross."
  description: "煤袋星云是南天最显眼的暗星云,距地球约 600 光年,横跨南十字座、半人马座与苍蝇座三个星座,视面约 7°×5°。它本质上是一团致密的星际尘埃与分子气体,遮挡了后方密集的银河星光,在明亮的银盘上呈现出一块醒目的黑斑,被南半球原住民视作天空中的「黑色剪影」图腾。它的消光高达数个星等,内部正孕育着未来的恒星。观测时需以广角镜头连同周围银河一同入画,才能展现这片「星空中的黑洞」般的轮廓,是南天肉眼即可辨认的标志性目标。"
  descriptionEn: "The Coalsack is the most prominent dark nebula in the southern sky, lying roughly 600 light-years away and spanning some 7° by 5° across Crux, Centaurus and Musca. It is a dense cloud of interstellar dust and molecular gas that blots out the rich Milky Way starlight behind it, appearing as a striking black void against the glowing band. Its extinction reaches several magnitudes, and the cloud likely harbors the early stages of future star formation. Many southern indigenous cultures recognized it as a dark celestial figure. Photographing it requires a wide-field lens to capture the silhouette together with the surrounding Milky Way."
  focal: "广角 24–135mm"
  image: c99
