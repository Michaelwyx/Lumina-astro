  summary: "明亮核球加一道贯穿盘面的尘埃带,似草帽。"
  summaryEn: "Edge-on spiral with a bright bulge and a hat-brim dust lane."
  description: "草帽星系距地球约 3100 万光年,位于室女座,因近乎侧向的盘面与一道贯穿前方的浓黑尘埃带,加上巨大明亮的核球,形似宽边墨西哥草帽而得名。这条尘埃带其实是一圈环绕核球的对称尘埃环,是星系内主要的恒星形成场所。它拥有约两千个球状星团,是银河系的十倍,核心还藏有一个质量约十亿太阳的超大质量黑洞。它视星等约 8 等,是较亮的旋涡星系。长焦拍摄能清晰勾勒出标志性的尘埃带与发光晕,是最具辨识度的星系之一。"
  descriptionEn: "The Sombrero Galaxy lies about 31 million light-years away in Virgo, named for its nearly edge-on disk, a thick dark dust lane crossing the front, and a large bright bulge that together resemble a wide-brimmed sombrero. That dust lane is actually a symmetric ring around the bulge and the galaxy's main site of star formation. It hosts about 2,000 globular clusters, ten times the Milky Way's, and a supermassive black hole of roughly a billion solar masses at its core. At magnitude 8, it is one of the brighter spirals. Long-focal-length imaging clearly traces its iconic dust lane and glowing halo, making it one of the most recognizable galaxies."
  focal: "长焦 1000mm+"
