  description: "M85 距地球约 6000 万光年,位于室女座星系团的北端边界,是一个平滑泛黄的透镜状(S0)星系。它没有明显旋臂,核心明亮、外缘逐渐隐没,常与旋涡星系 NGC 4394 同框形成对比。亮度中等而结构简洁,适合作为室女团巡游的衬景目标。"
  descriptionEn: "M85 lies about 60 million light-years away at the northern boundary of the Virgo Cluster and is a smooth, yellowish lenticular (S0) galaxy. It lacks distinct spiral arms, showing a bright core that fades into a diffuse halo, and often shares the frame with the spiral NGC 4394. Moderately bright and clean in form, it makes a fine companion target on a Virgo Cluster tour."
