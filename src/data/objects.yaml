  summary: "面朝大旋涡,旋臂繁复对比鲜明。"
  summaryEn: "Grand face-on spiral with intricate arms and a distorted satellite."
  description: "NGC 1232 距地球约 6000 万光年,位于波江座,是一个壮观的面朝我们的中介型旋涡星系。众多旋臂从黄色核球向外铺展,蓝色年轻星团与粉红色恒星形成区点缀其间,外围还有暗弱旋臂延伸。星系一侧伴有一个被引力扭曲、形似字母的小卫星星系 NGC 1232A。欧洲南方天文台甚大望远镜(VLT)曾为它拍摄了一幅极著名的高分辨彩色全景。它视星等约 10 等,结构繁复对比鲜明,是冬季波江座中富有看点的长焦目标。"
  descriptionEn: "NGC 1232 lies about 60 million light-years away in Eridanus, a spectacular face-on intermediate spiral. Numerous arms unfurl from a yellow bulge, peppered with blue young clusters and pink star-forming regions, with faint outer arms extending further. To one side lies a small, gravitationally distorted satellite, NGC 1232A. ESO's Very Large Telescope captured a famous high-resolution color portrait of it. At magnitude 10, its intricate, high-contrast structure makes it a rewarding long-focal-length target in winter Eridanus."
  focal: "长焦 1000mm+"
  image: ngc1232
