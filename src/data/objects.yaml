  difficulty: intermediate
  summary: "明亮的侧向星暴星系,尘埃纹理丰富。"
  summaryEn: "A bright nearby edge-on starburst galaxy with rich dust texture."
  description: "玉夫座星系距地球约 1140 万光年,是离我们最近的星暴星系之一,又称「银币星系」,位于玉夫座,是玉夫座星系群的主导成员。它斜侧向的盘面布满纵横交错的暗尘埃带与明亮恒星结,核区正剧烈形成新恒星并向外吹出炽热的气体外流(超级星风)。它视星等约 7.2、视面积大,是肉眼边缘可见、双筒镜中即可辨认的明亮星系。它明亮且大,中焦镜头即可拍出细腻的尘埃纹理,深曝还能记录核区的红色外流。它是南天秋季最受欢迎的星系摄影目标之一。"
  descriptionEn: "The Sculptor Galaxy lies about 11.4 million light-years away and is one of the nearest starburst galaxies, also called the Silver Coin Galaxy, the dominant member of the Sculptor Group in the constellation Sculptor. Its near-edge-on disk is crisscrossed with dark dust lanes and bright stellar knots, while the core vigorously forms new stars and drives a hot gaseous outflow (a superwind). At magnitude 7.2 and large in apparent size, it is faintly visible to the naked eye and easy in binoculars. Bright and large, it shows fine dust texture even at a medium focal length, with deep exposures capturing the red core outflow. It is one of the most popular galaxy targets of the southern autumn sky."
  focal: "中焦 600–1000mm"
  image: ngc253
