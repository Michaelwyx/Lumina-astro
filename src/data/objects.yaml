  magnitude: 8.8
  hemisphere: north
  season: summer
  difficulty: intermediate
  summary: "面朝旋涡,超新星频发如放烟花。"
  summaryEn: "Face-on spiral with frequent supernovae, hence 'fireworks'."
  description: "烟花星系距地球约 2500 万光年,横跨仙王座与天鹅座边界,是一个面朝我们的中介型旋涡星系。过去一百年间,它已爆发了十颗以上超新星,频率远高于一般星系,因而被称为烟花星系。它的旋臂上布满粉红色 H II 区和蓝色星团,恒星形成异常活跃。由于位置紧贴银河系盘面,前景密布银河系恒星,画面繁星点点。它表面亮度因银河系尘埃遮挡而偏暗,中焦深曝能拍出其活跃的旋臂与点缀其间的星点。它是夏季北天的人气星系目标。"
  descriptionEn: "The Fireworks Galaxy lies about 25 million light-years away on the Cepheus-Cygnus border, a face-on intermediate spiral. Over the past century it has produced more than ten supernovae, far more often than typical galaxies, earning its name. Its arms are studded with pink H II regions and blue clusters, marking intense star formation. Lying close to the plane of the Milky Way, its field is densely sprinkled with foreground stars. Dimmed somewhat by intervening Galactic dust, deep mid-focal-length imaging brings out its active arms and the scattered stars across them. It is a popular summer galaxy target in the northern sky."
  focal: "中焦 600–1000mm"
  image: ngc6946
- id: NGC7320
  name: "史蒂芬五重奏"
  nameEn: "Stephan's Quintet"
  catalog: Other
  type: galaxy
  typeLabel: "相互作用星系群"
  constellation: "飞马座 Peg"
  ra: "22h36m"
  dec: 33
  decLabel: "+33°"
  magnitude: 13
  hemisphere: north
  season: autumn
  difficulty: advanced
  summary: "五星系紧凑成团,潮汐撕扯激烈。"
  summaryEn: "Famous compact group whose foreground member NGC 7320 is a chance projection."
  description: "史蒂芬五重奏是天空中最著名的致密星系群,由五个星系组成,位于飞马座。其中四个成员(NGC 7317、7318A、7318B、7319)真正成团,距地球约 2.9 亿光年,正在引力撕扯下扭曲变形,彼此碰撞激发出巨大的冲击波与潮汐尾。而前景的 NGC 7320 其实只是一个距地球约 4000 万光年的偶然投影星系,比群体近七倍,这一发现曾解开关于该群本质的长期争论。它是 JWST 首批公开影像之一,需长焦深曝,呈现遥远宇宙中群体碰撞的壮观一幕。"
  descriptionEn: "Stephan's Quintet is the sky's most famous compact galaxy group, five galaxies in Pegasus. Four of them (NGC 7317, 7318A, 7318B, and 7319) form a true group about 290 million light-years away, distorting under gravitational tugs and colliding to drive vast shock waves and tidal tails. The foreground galaxy NGC 7320, however, is merely a chance projection about 40 million light-years away, some seven times closer than the group, a discovery that resolved a long-standing debate over the group's nature. It was among the first JWST images released to the public, and rewards long-focal deep exposures with a spectacular view of group collisions in the distant universe."
  focal: "长焦 1500mm+"
  image: ngc7320
- id: NGC7331
  name: "NGC 7331"
  nameEn: "NGC 7331"
  catalog: Caldwell
