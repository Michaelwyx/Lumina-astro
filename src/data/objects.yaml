  summary: "形似天鹅的明亮恒星形成区。"
  summaryEn: "Bright swan-shaped star-forming region, one of the Galaxy's brightest."
  description: "欧米伽星云又名天鹅星云,距地球约 5500 光年,位于人马座,是银河系中质量最大、最明亮的恒星形成区之一。明亮的核心区呈天鹅游水般的弧形,因而又得名天鹅星云;弧形其实是一大片电离氢区被前景尘埃遮挡后露出的发光边缘。星云内部恒星形成异常活跃,藏有上千颗年轻恒星与浓密的分子云。它表面亮度很高,即便用小口径望远镜也能轻松看到那道明亮的弧。色彩丰富、对比鲜明,是夏季银河中人气极高的观测与拍摄目标。"
  descriptionEn: "The Omega Nebula, also called the Swan Nebula, lies about 5,500 light-years away in Sagittarius and is among the most massive and luminous star-forming regions in the Galaxy. Its bright core forms a swimming-swan arc, the glowing edge of a large ionized hydrogen region revealed where foreground dust thins. Star formation is intense here, hiding over a thousand young stars within dense molecular clouds. Its high surface brightness makes the bright arc easy to see even in small telescopes. Colorful and high in contrast, it is a hugely popular summer Milky Way target for both observers and imagers."
  focal: "中长焦 800–1200mm"
  image: m17
