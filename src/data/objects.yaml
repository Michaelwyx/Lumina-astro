  season: summer
  difficulty: beginner
  summary: "北天最壮观的球状星团。"
  summaryEn: "The northern sky's grandest globular, target of the Arecibo message."
  description: "M13 又称武仙座大球状星团,距地球约 2.2 万光年,是北半球最壮丽的球状星团,包含约三十万颗恒星。它在暗夜下肉眼可见为一团朦胧光斑,中心高度密集,边缘的星点呈链状向外散开。1974 年,人类曾通过阿雷西博射电望远镜向 M13 发射了著名的「阿雷西博信息」。它视星等约 5.8 等,是球状星团摄影的首选目标,长焦下可分解出成千上万颗成员星。它是夏季武仙座中最受欢迎的观测对象。"
  descriptionEn: "M13, the Great Hercules Globular Cluster, lies about 22,000 light-years away and is the most magnificent globular in the northern sky, containing roughly 300,000 stars. Visible to the naked eye as a hazy patch under dark skies, it has a densely packed core with chains of stars trailing from its edges. In 1974, the famous Arecibo message was beamed toward M13 from the Arecibo radio telescope. At magnitude 5.8 it is the premier globular-cluster imaging target, resolving into tens of thousands of member stars at long focal lengths. It is the most popular observing object in summer Hercules."
  focal: "长焦 1000mm+"
  image: m13-hercules
