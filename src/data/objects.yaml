  summary: "群星排布如展翅蝴蝶。"
  summaryEn: "An open cluster in Scorpius whose bright stars trace a butterfly's wings."
  description: "蝴蝶星团(M6,NGC 6405)距地球约 1600 光年,位于天蝎座尾部,因明亮成员星的排布形似一只展翅的蝴蝶而得名。它含有约八十颗较亮的恒星,多数为炽热的蓝白色 B 型星,而其中最亮的一颗——船尾座 BM 是颗橙色的半规则变星,在一片蓝白群星中格外醒目。星团年龄约一亿年,镶嵌在天蝎座银河最密集、最丰富的星野背景之中,肉眼可见。它是南天夏季易于拍摄的明亮疏散星团,适合中焦呈现群星璀璨与翅膀造型。"
  descriptionEn: "The Butterfly Cluster (M6, NGC 6405) lies about 1,600 light-years away in the tail of Scorpius, named for bright member stars arranged like a butterfly with open wings. It contains about eighty brighter stars, mostly hot blue-white B-type stars, while its brightest member, BM Scorpii, is an orange semiregular variable that stands out vividly amid the blue-white throng. Around 100 million years old, the cluster is set against the densest, richest star fields of the Scorpius Milky Way and is visible to the naked eye. It is an easy, bright open cluster to image in the southern summer sky, well suited to medium focal lengths that bring out the glittering stars and wing shape."
  focal: "中焦 400–800mm"
