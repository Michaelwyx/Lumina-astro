  difficulty: beginner
  summary: "全天最大最亮的球状星团。"
  summaryEn: "The Galaxy's largest, brightest globular—likely a stripped dwarf core."
  description: "半人马ω星团距地球约 1.7 万光年,位于半人马座,是银河系最大、最亮的球状星团,含约一千万颗恒星,总质量约四百万太阳。它肉眼可见为一团星状光斑,视面接近满月大小。它的成员星年龄与金属丰度并不一致,因此被认为很可能是一个被银河系吞并的矮星系残留的核心。星团中心异常致密,甚至可能藏有一个中等质量黑洞。南天观测者用长焦能分解出令人窒息的密集星海,是南半球深空摄影的瑰宝。"
  descriptionEn: "Omega Centauri lies about 17,000 light-years away in Centaurus, the largest and brightest globular cluster in the Galaxy, holding some ten million stars with a mass near four million Suns. Visible to the naked eye as a fuzzy star, it spans nearly the size of the full Moon. Its member stars span a range of ages and metallicities, so it is widely thought to be the stripped core of a dwarf galaxy absorbed by the Milky Way. Its core is unusually dense and may even harbor an intermediate-mass black hole. Southern observers can resolve a breathtaking sea of stars at long focal lengths, a jewel of southern deep-sky imaging."
  focal: "中长焦 800–1200mm"
  image: omega-cen
