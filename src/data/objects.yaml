  summary: "紧邻 M42 的逗号状发射星云。"
  summaryEn: "Comma-shaped emission nebula just north of the Orion Nebula."
  description: "M43 又称德梅伦星云,是猎户座大星云北侧被一条暗尘带分隔出的一块独立发射星云,距地球约 1340 光年,与 M42 同属猎户座大星云复合体。它由 18 世纪法国天文学家德梅伦发现,围绕年轻恒星 NU Orionis 形成逗号般的弧形结构。虽然常被明亮得多的 M42 抢去风头,但它本身也是活跃的恒星形成区。它的色彩与 M42 同样浓郁,呈红粉与蓝绿色调。在拍摄猎户座大星云时,它是构图中不可或缺的组成部分。"
  descriptionEn: "M43, De Mairan's Nebula, is a distinct emission nebula north of the Orion Nebula, separated from M42 by a dark dust lane and lying about 1,340 light-years away within the same Orion complex. Discovered by the 18th-century French astronomer De Mairan, it forms a comma-shaped arc around the young star NU Orionis. Though usually overshadowed by the far brighter M42, it is an active star-forming region in its own right. Its colors are as rich as M42's, glowing in pink-red and teal. When imaging the Orion Nebula, it is an essential part of the composition."
  focal: "中焦 400–800mm"
  image: m43
