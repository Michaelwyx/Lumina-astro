  summary: "猎户座中最亮的蓝色反射星云。"
  summaryEn: "The brightest reflection nebula in the sky, a blue glow in Orion."
  description: "M78 是全天最亮的反射星云之一,距地球约 1350 光年,位于猎户座大星云东北的猎户座分子云复合体内。两颗炽热的年轻 B 型恒星照亮周围的尘埃,尘埃散射星光散射出醒目的钴蓝色光辉。星云内夹杂着蜿蜒的暗尘带,并藏有数十个赫比格-哈罗天体——年轻恒星喷流撞击周围气体产生的发光结点,是恒星诞生的证据。它附近还有 NGC 2071 等伴随星云。拍摄时常与周边广阔的红色 Hα 发射区域形成冷暖对比,适合中长焦拍摄,是猎户座区域上镜的反射星云。"
  descriptionEn: "M78 is one of the brightest reflection nebulae in the sky, lying about 1,350 light-years away within the Orion molecular cloud complex northeast of the Orion Nebula. Two hot young B-type stars illuminate the surrounding dust, which scatters their light into a striking cobalt-blue glow. Winding dark dust lanes thread the nebula, which hosts dozens of Herbig-Haro objects—glowing knots where young-star jets slam into surrounding gas, evidence of star birth. Nearby companion nebulae such as NGC 2071 share the region. Images often play its cool blue against broad red H-alpha emission around it, suiting a medium-to-long focal length, making it a photogenic reflection nebula in the Orion field."
  focal: "中长焦 800–1200mm"
  image: m78
