  summary: "蜿蜒尘埃柱中的恒星育婴室。"
  summaryEn: "A winding dark dust pillar and stellar nursery within the vast IC 1396 complex."
  description: "象鼻星云是巨大发射星云 IC 1396 内一条蜿蜒的暗尘埃柱,整片复合体距地球约 2400 光年,位于仙王座的造父变星石榴石星附近。这条「象鼻」(IC 1396A)是正在引力坍缩、孕育新恒星的稠密分子区,其明亮的卷边被中央高温多星系统 HD 206267 的强辐射照亮和侵蚀。整个 IC 1396 跨度超过 100 光年,视面积达数个满月宽,以红色氢发射为主并夹杂蓝色反射成分。它表面亮度较低,适合宽场窄带长曝光,是仙王座秋季摄影中色彩与结构兼备的人气目标。"
  descriptionEn: "The Elephant's Trunk Nebula is a sinuous dark dust pillar within the vast emission nebula IC 1396, the whole complex lying about 2,400 light-years away in Cepheus near the Garnet Star. This trunk (IC 1396A) is a dense, gravitationally collapsing region forming new stars, its bright rim lit and eroded by intense radiation from the central hot multiple star HD 206267. The entire IC 1396 spans over 100 light-years and covers several full-moon widths, dominated by red hydrogen emission with bluish reflection mixed in. Its low surface brightness suits wide-field narrowband exposures, making it a popular autumn Cepheus target rich in both color and structure."
  focal: "广角/中焦 135–400mm"
  image: ic1396
