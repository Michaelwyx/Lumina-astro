  summary: "暗尘勾勒出洞穴口的发射星云。"
  summaryEn: "A red H II region whose curved dark dust frames a cave-like opening in Cepheus."
  description: "洞穴星云(Sh2-155)距地球约 2400 光年,位于仙王座,因一道弧形暗尘埃在明亮的红色氢气前勾勒出洞穴入口般的轮廓而得名。它位于规模庞大的仙王座 B 分子云边缘,是一处活跃的电离氢恒星形成区,亮边由邻近高温恒星的辐射激发的电离前沿构成,内部还埋藏着年轻的恒星和原恒星。星云中红色发射与蓝色反射成分并存,色彩与结构层次丰富。它表面亮度偏低,适合中长焦窄带长曝光,是仙王座秋季颇具看点的目标。"
  descriptionEn: "The Cave Nebula (Sh2-155) lies about 2,400 light-years away in Cepheus, named for a curved dark dust band that frames a cave-like opening against bright red hydrogen gas. Sitting on the edge of the large Cepheus B molecular cloud, it is an active H II star-forming region whose bright rim is an ionization front excited by radiation from nearby hot stars, with young stars and protostars embedded within. The nebula combines red emission and blue reflection components, rich in color and layered structure. Of relatively low surface brightness, it suits medium-to-long focal narrowband exposures, making it a rewarding autumn Cepheus target."
  focal: "中长焦 800–1200mm"
