  difficulty: advanced
  summary: "侧向旋涡,尘埃带中喷出垂直细丝。"
  summaryEn: "Edge-on spiral with vertical dust filaments rising from its lane."
  description: "NGC 891 距地球约 3000 万光年,位于仙女座,是一个近乎完美侧向的旋涡星系,中央贯穿一道厚重的暗尘埃带。深度曝光能显现从盘面垂直喷出的尘埃细丝,这些细丝由盘内剧烈的恒星形成驱动的气体外流抛起,高度可达数千光年。它的尺度与结构都与银河系相近,因此常被视为从侧面看银河系的样板。它视星等约 10 等,表面亮度不高但形态优雅。长焦深曝是侧向星系摄影的经典挑战目标。"
  descriptionEn: "NGC 891 lies about 30 million light-years away in Andromeda, a nearly perfectly edge-on spiral split by a thick dark dust lane. Deep exposures reveal dust filaments rising vertically from the disk, lofted thousands of light-years high by outflows driven by intense star formation. Similar in size and structure to the Milky Way, it is often treated as a model for how our own galaxy looks edge-on. At magnitude 10 its surface brightness is modest but its form is elegant. Deep long-focal-length imaging makes it a classic edge-on-galaxy challenge target."
  focal: "长焦 1000mm+"
