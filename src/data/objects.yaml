  summary: "穿过亮星的「女巫扫帚」丝带。"
  summaryEn: "The western half of the Cygnus Loop, the Witch's Broom past 52 Cygni."
  description: "西面纱星云(NGC 6960)是天鹅座环超新星遗迹的西半部,距地球约 2400 光年,位于天鹅座。它因恰好穿过明亮的前景恒星 52 Cygni、形似一把扫帚而又称「女巫扫帚」星云。它与东面纱星云同属约一万至两万年前一颗大质量恒星爆发的遗迹,膨胀的激波在与星际介质碰撞中被激发,呈现出红色氢(Hα)与青色氧(O III)交织的精细丝状结构。整个天鹅座环视面达约 3°(约 6 个满月宽),亮度低但结构极其精致。它是宽场窄带摄影的杰作,适合中焦镜头配合双窄带滤镜拍摄。"
  descriptionEn: "The Western Veil Nebula (NGC 6960) is the western half of the Cygnus Loop supernova remnant, lying about 2,400 light-years away in Cygnus. Because it passes across the bright foreground star 52 Cygni and resembles a broom, it is also called the Witch's Broom Nebula. Like the Eastern Veil, it is the remnant of a massive star that exploded roughly 10,000–20,000 years ago, its expanding shock wave excited as it collides with the interstellar medium to glow in interwoven red hydrogen (H-alpha) and cyan oxygen (O III) filaments. The whole Cygnus Loop spans about 3° (some six Moon-widths), faint but exquisitely structured. It is a wide-field narrowband masterpiece, suiting a medium focal length with dual-narrowband filters."
  focal: "中焦 400–800mm"
  image: veil
