  difficulty: intermediate
  summary: "边缘朝向的星暴星系,核心喷出红色氢气。"
  summaryEn: "Edge-on starburst galaxy venting red hydrogen from its core."
  description: "雪茄星系距地球约 1200 万光年,位于大熊座,是离我们最近的星暴星系之一,也是 M81 星系群第二大成员。它与大旋涡星系 M81 的引力相互作用激发了狂暴的恒星形成,核心区造星速率比整个银河系快约十倍。其细长侧向的盘面中心向两侧喷出红色的电离氢外流,延伸达上万光年,这道星系风由众多超新星与恒星风共同驱动。加 Hα 滤镜拍摄能突出这股壮观的红色喷流。它与 M81 仅相距半度多,常被一框同拍,是相互作用星系中最上镜的目标之一。"
  descriptionEn: "The Cigar Galaxy lies about 12 million light-years away in Ursa Major, one of the nearest starburst galaxies and the second-largest member of the M81 group. Gravitational interaction with the grand spiral M81 has triggered furious star formation, with the core forming stars roughly ten times faster than the entire Milky Way. From the center of its slim edge-on disk, red ionized-hydrogen outflows vent tens of thousands of light-years to either side, a galactic wind driven by supernovae and stellar winds. Hydrogen-alpha imaging highlights this spectacular red plume. Just over half a degree from M81, the two are often framed together, making it one of the most photogenic interacting galaxies."
  focal: "中焦 600–1000mm"
  image: m82-cigar
