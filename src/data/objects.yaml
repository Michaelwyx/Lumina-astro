  season: winter
  difficulty: beginner
  summary: "轮廓酷似加州的细长红云。"
  summaryEn: "A long red emission nebula shaped strikingly like the state of California."
  description: "加州星云距地球约 1000 光年,位于英仙座,因细长的轮廓酷似美国加利福尼亚州的地图形状而得名,长度超过 2.5°(约满月的五倍)。它是一片巨大的电离氢区,主要由附近的炽热蓝巨星 Menkib(船尾座 ξ Per,实为英仙座)激发氢气发出红光。它表面亮度很低,肉眼几乎不可见,但视面巨大,非常适合用宽视场镜头或加 Hα、双窄带滤镜拍摄。拍摄时既可作为单一主体,也可连同恒星 Menkib 与周边星场构图。它是冬季北天宽场与窄带摄影的人气目标。"
  descriptionEn: "The California Nebula lies about 1,000 light-years away in Perseus and is named for its elongated outline, which strikingly resembles the map of the U.S. state of California, stretching more than 2.5° (about five Moon-widths). It is a large ionized-hydrogen region glowing red, excited mainly by the nearby hot blue giant Menkib (xi Persei). Its surface brightness is very low and it is barely visible to the eye, but its huge apparent size makes it ideal for wide-field lenses or H-alpha and dual-narrowband filters. It can be framed as a standalone subject or composed with Menkib and the surrounding star field. It is a popular winter target for northern wide-field and narrowband imaging."
  focal: "广角/中焦 135–400mm"
  image: ngc1499
