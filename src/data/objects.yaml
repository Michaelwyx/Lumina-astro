  summary: "两团璀璨星团同框相依。"
  summaryEn: "Two brilliant young open clusters side by side in Perseus."
  description: "英仙双星团(C14,NGC 869 与 NGC 884)距地球约 7500 光年,位于英仙座,是两个年轻而明亮的疏散星团并肩相依,可在同一视场中尽收眼底,肉眼下即是英仙座银河中一团显眼的光斑。两团各含数百颗恒星,年龄仅约一千多万年,以炽热的蓝白色超巨星为主,其间点缀着几颗醒目的橙红色超巨星,冷暖色彩对比迷人。它们同属英仙座 OB1 星协,在天空中相距不到半度。早在古希腊喜帕恰斯时代便有记载,是秋季最上镜、最适合入门拍摄的疏散星团目标之一。"
  descriptionEn: "The Double Cluster (C14, NGC 869 and NGC 884) lies about 7,500 light-years away in Perseus, two young, brilliant open clusters side by side that fit in a single field and appear to the naked eye as a conspicuous glow in the Perseus Milky Way. Each holds several hundred stars only about 12-13 million years old, dominated by hot blue-white supergiants accented by a few striking orange-red supergiants, a charming contrast of warm and cool. Both belong to the Perseus OB1 association and lie less than half a degree apart on the sky. Recorded as far back as the Greek Hipparchus, it is among the most photogenic and beginner-friendly open-cluster targets of autumn."
  focal: "中焦 400–800mm"
  image: double-cluster
