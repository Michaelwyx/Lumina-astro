  description: "新月星云距地球约 5000 光年,是由中心沃尔夫-拉叶星 WR 136 抛出的炽热气壳。这颗濒死大质量恒星的高速星风撞上早先抛出的物质,吹出一个约 25 光年宽的发光气泡。窄带 SHO 拍摄能呈现氧三蓝绿外壳与氢红丝缕交织的层次,周边还浸在巨大的 OIII 弧中。它是天鹅座银河带上最受欢迎的窄带目标之一。"
  descriptionEn: "About 5,000 light-years away, the Crescent Nebula is a shell blown by the dying Wolf–Rayet star WR 136. Its fast stellar wind slams into earlier ejecta, inflating a glowing bubble roughly 25 light-years across. Narrowband SHO imaging reveals teal OIII shells laced with red hydrogen filaments, set within a vast surrounding OIII arc. It is one of the most popular narrowband targets along the Cygnus Milky Way."
  focal: "中—长焦 700–1200mm"
  image: ngc6888
