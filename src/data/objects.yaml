  hemisphere: south
  season: summer
  difficulty: beginner
  summary: "尘埃雕成「双龙对峙」的星云。"
  summaryEn: "Sculpted emission nebula shaped like two fighting dragons in Ara."
  description: "NGC 6188 距地球约 4000 光年,位于南天的天坛座,是一片被辐射雕琢的发射星云。其暗尘脊与亮边交错的轮廓形似两条对峙的巨龙,故称「天坛座斗龙」。星云的物质源自巨大的分子云,被附近年轻星协 Ara OB1 中的炽热大质量恒星吹散并照亮。这些恒星仅几百万年历史,其紫外辐射不断侵蚀尘埃、激发新一轮恒星诞生。红色发射星云中起伏的暗尘脊极具立体感,是南天窄带摄影的人气结构目标。"
  descriptionEn: "NGC 6188 lies about 4,000 light-years away in the southern constellation Ara, an emission nebula sculpted by radiation. Its interlocking dark ridges and bright rims resemble two confronting dragons, earning the name the Fighting Dragons of Ara. The material comes from a giant molecular cloud, blown out and lit by hot massive stars in the nearby young association Ara OB1. Only a few million years old, those stars erode the dust with ultraviolet light and trigger fresh star birth. The undulating dark ridges set against red emission give it strong depth, a favorite southern narrowband structure target."
  focal: "中长焦 800–1200mm"
  image: ngc6188
