  difficulty: advanced
  summary: "棒旋带活动核,核心有恒星形成环。"
  summaryEn: "A barred Seyfert spiral with a starburst ring, jets and a companion galaxy."
  description: "NGC 1097 距地球约 4500 万光年,位于天炉座,是一个壮观的棒旋星系,也是一个塞弗特活动星系。它的核心藏有约 1.4 亿倍太阳质量的超大质量黑洞,黑洞外围环绕着一圈直径约 5000 光年、正在剧烈造星的明亮星环,是研究核区恒星形成的经典对象。它身旁有矮椭圆伴星系 NGC 1097A,正与主星系发生相互作用。深度曝光还揭示出四条神秘的、由恒星组成的暗弱光学喷流从核心向外延伸。棒、环、喷流、伴星系俱全,使它成为南天极具看点的长焦深空目标。"
  descriptionEn: "NGC 1097 lies about 45 million light-years away in Fornax and is a spectacular barred spiral that is also a Seyfert active galaxy. Its core harbors a supermassive black hole of roughly 140 million solar masses, surrounded by a bright ring about 5,000 light-years across that is vigorously forming stars, making it a classic subject for studying nuclear star formation. It interacts with the dwarf elliptical companion NGC 1097A nearby. Deep exposures also reveal four mysterious faint optical jets made of stars extending from the nucleus. With a bar, ring, jets and a companion all present, it is a richly rewarding long-focus deep-sky target in the southern sky."
  focal: "长焦 1000mm+"
  image: ngc1097
