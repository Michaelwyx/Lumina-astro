  hemisphere: north
  season: spring
  difficulty: intermediate
  summary: "结构完美的大旋涡,常与雪茄星系同框。"
  summaryEn: "A perfect grand-design spiral, often framed with the Cigar Galaxy M82."
  description: "波德星系距地球约 1170 万光年,位于大熊座,是 M81 星系群的主导成员,以德国天文学家约翰·波德的名字命名。它拥有对称工整的宏伟旋臂与明亮的黄色核球,核心藏有一个约 7000 万倍太阳质量的超大质量黑洞,是大旋涡星系的典范。它与近旁剧烈的星暴星系 M82(雪茄星系)仅相距半度多,二者间的引力相互作用激发了 M82 的星暴,二者可在同一画面中合拍。在宽视场长曝光下,还能记录到环绕二者、淡如薄纱的银河系内星际尘埃流(IFN)。它结构清晰、核心明亮,是中焦星系摄影的人气目标。"
  descriptionEn: "Bode's Galaxy lies about 11.7 million light-years away in Ursa Major and is the dominant member of the M81 Group, named after the German astronomer Johann Bode. It boasts symmetric, well-ordered grand-design arms and a bright yellow bulge, with a supermassive black hole of roughly 70 million solar masses at its core, making it a textbook large spiral. It sits barely half a degree from the violent starburst galaxy M82 (the Cigar Galaxy), whose gravitational interaction with M81 triggered that starburst, and the two can be imaged in a single frame. Deep wide-field exposures also capture the faint integrated flux nebula (IFN), galactic dust drifting around both. With clear structure and a bright core, it is a popular medium-focal-length galaxy target."
  focal: "中焦 600–1000mm"
  image: m81-bode
