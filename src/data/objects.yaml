  summary: "银河系最大的卫星星系。"
  summaryEn: "The Milky Way's largest satellite galaxy, naked-eye in southern skies."
  description: "大麦哲伦云距地球约 16 万光年,是银河系最大的卫星矮星系,在南天肉眼可见为一片孤立的云状光斑,因麦哲伦环球航行的记述而得名。它含有数百亿颗恒星,内部恒星形成极为活跃,孕育出整个本星系群中最壮观的恒星诞生区——蜘蛛星云(剑鱼座30)。1987 年它还爆发了现代最近的一颗肉眼可见超新星 SN 1987A,具有重大科学意义。它正与小麦哲伦云一同绕银河系运动,二者之间由「麦哲伦流」气体桥相连。广角镜头能收纳整体云团,长焦则可深挖其中无数星云与星团,是南半球天文摄影不可错过的目标。"
  descriptionEn: "The Large Magellanic Cloud lies about 160,000 light-years away and is the Milky Way's largest satellite dwarf galaxy, visible to the naked eye as an isolated patch of haze in southern skies. Home to tens of billions of stars, it harbors the Tarantula Nebula (30 Doradus), the most spectacular star-forming region in the entire Local Group. It also hosted SN 1987A, the closest naked-eye supernova of modern times and a milestone for astrophysics. The LMC orbits the Milky Way together with the Small Magellanic Cloud, the two linked by the gaseous Magellanic Stream. A wide field captures the whole cloud, while longer focal lengths reveal countless embedded nebulae and clusters, making it an essential southern-hemisphere imaging target."
  focal: "广角 24–135mm"
  image: lmc
