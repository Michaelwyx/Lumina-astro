  difficulty: intermediate
  summary: "双极蝴蝶状的行星状星云。"
  summaryEn: "A dramatic bipolar planetary nebula with butterfly-wing lobes in Scorpius."
  description: "虫状星云(又称蝴蝶星云)距地球约 3400 光年,位于天蝎座,是已知最复杂、最壮丽的双极行星状星云之一。它的中心恒星是已知温度最高的白矮星之一,表面温度高达约 25 万度,被一圈致密的尘埃环遮挡,正是这道尘埃环将喷出的气体约束成对称展开的「蝴蝶翅膀」。垂死恒星向两侧高速喷出炽热气体,翅膀跨度超过 3 光年,内部还含有罕见的矿物尘埃如方解石。它视星等约 7.1,长焦高分辨拍摄下细节惊艳。它是哈勃望远镜的经典成像目标,也是南天夏季行星状星云摄影的精品。"
  descriptionEn: "The Bug Nebula (also the Butterfly Nebula) lies about 3,400 light-years away in Scorpius and is one of the most complex and spectacular bipolar planetary nebulae known. Its central star is one of the hottest white dwarfs known, with a surface temperature near 250,000 K, hidden behind a dense dust torus that channels the ejected gas into symmetric 「butterfly wings.」 The dying star drives hot gas outward at high speed, the wings spanning over 3 light-years and containing rare mineral dust such as calcite. At magnitude 7.1, it shows stunning detail under high-resolution long-focus imaging. A classic Hubble target, it is a gem of southern summer planetary-nebula photography."
  focal: "长焦 1500mm+"
  image: ngc6302
