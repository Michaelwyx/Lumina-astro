  difficulty: intermediate
  summary: "红蓝相间、暗带三分的经典星云。"
  summaryEn: "Classic three-lobed nebula combining red emission, blue reflection and dark dust."
  description: "三裂星云(M20)因被三条暗尘带分割成数瓣而得名,距地球约 4100 光年,与礁湖星云同处人马座恒星密集区。它罕见地在同一视场内汇集了三种星云:红色发射星云、蓝色反射星云与勾勒分界的暗星云,色彩对比极其上镜。其红色部分由中央的多星系统 HD 164492 电离发光,这些年轻恒星仅形成约三十万年。星云北侧的蓝色反射成分则由尘埃散射星光而成。它常与邻近的礁湖星云 M8 同框,是夏季人马座最具标志性的中长焦目标之一。"
  descriptionEn: "The Trifid Nebula (M20) takes its name from the dark dust lanes that split it into several lobes, lying about 4,100 light-years away in the same crowded Sagittarius region as the Lagoon. It rarely combines three nebula types in one field: red emission, blue reflection, and the dark dust outlining their boundaries, giving striking photographic contrast. The red portion is ionized by the central multiple star HD 164492, whose young stars formed only about 300,000 years ago. The blue reflection component to the north arises from dust scattering starlight. Frequently framed with the neighboring Lagoon Nebula (M8), it is one of the most iconic medium-to-long focal targets of the summer Sagittarius sky."
  focal: "中长焦 800–1200mm"
  image: m20-trifid
