  magnitude: 8.9
  hemisphere: north
  season: winter
  difficulty: intermediate
  summary: "M33 翻版,旋臂遍布红色星云。"
  summaryEn: "M33-like spiral with arms full of pink H II regions."
  description: "NGC 2403 距地球约 1000 万光年,位于鹿豹座,是 M81 星系群的外围成员,也是离本星系群最近的星系之一。它外貌酷似三角座星系 M33,松散的旋臂上散布着大量明亮的粉红色 H II 区,是恒星形成活跃的中介型旋涡星系。它是首批在本星系群之外确认含造父变星的星系之一,对早期宇宙距离尺度的测定意义重大。它视面积较大、表面亮度尚可,中焦长曝能拍出绚丽的恒星诞生地。它是北天一个被低估的佳作。"
  descriptionEn: "NGC 2403 lies about 10 million light-years away in Camelopardalis, an outlying member of the M81 group and one of the closest galaxies to the Local Group. It strongly resembles the Triangulum Galaxy M33, its loose arms strewn with many bright pink H II regions, an active star-forming intermediate spiral. It was among the first galaxies beyond the Local Group confirmed to contain Cepheid variables, important for early distance-scale measurements. With a fairly large angular size and decent surface brightness, deep mid-focal-length imaging captures gorgeous stellar nurseries. It is an underrated northern gem."
  focal: "中焦 600–1000mm"
  image: ngc2403
