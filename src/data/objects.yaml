  magnitude: 8.5
  hemisphere: north
  season: spring
  difficulty: intermediate
  summary: "核心前方一道暗黑尘埃带,如黑眼圈。"
  summaryEn: "Spiral galaxy with a dramatic dark dust lane and counter-rotating disks."
  description: "黑眼睛星系(M64)距地球约 1700 万光年,位于后发座,因核心前方一道醒目的暗黑尘埃带形似黑眼圈而得名,又称「睡美人星系」。它最奇特之处在于内外两个盘以相反方向旋转:内盘半径约 3000 光年,外盘延伸至约 4 万光年,二者交界处气体激烈碰撞、压缩,触发剧烈的恒星形成。这种反向旋转很可能源于约十亿年前并合了一个小卫星星系。那道标志性的尘埃带正是尚未沉降的并合残骸物质。长焦拍摄能突出这只独特的「黑眼睛」,对比强烈、极富戏剧性。"
  descriptionEn: "The Black Eye Galaxy (M64) lies about 17 million light-years away in Coma Berenices, named for a striking dark dust band in front of its core that resembles a black eye, also called the Sleeping Beauty Galaxy. Its most peculiar feature is two disks rotating in opposite directions: an inner disk about 3,000 light-years in radius and an outer disk extending to roughly 40,000 light-years, with gas colliding and compressing at their boundary to trigger vigorous star formation. This counter-rotation likely arose from the merger of a small satellite galaxy about a billion years ago, and the signature dust lane is debris from that event not yet settled. Long-focal imaging emphasizes this unique \"black eye,\" yielding strong, dramatic contrast."
  focal: "长焦 1000mm+"
  image: m64-blackeye
