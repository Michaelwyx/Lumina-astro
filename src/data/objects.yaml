  summaryEn: "A ghostly blue reflection nebula at a dark dust's tip."
  description: "vdB 152 距地球约 1400 光年,位于仙王座一条长长的暗尘埃丝带末端,是一团幽淡的蓝色反射星云,又称「幽灵星云」。尘埃挡住后方星光形成暗带,末端被一颗恒星照亮成蓝色。表面极暗,需暗夜深曝光呈现其幽蓝与棕褐尘埃的对比,是秋季考验功力的反射星云。"
  descriptionEn: "About 1,400 light-years away at the end of a long dark dust filament in Cepheus, vdB 152 is a faint blue reflection nebula nicknamed the 'Ghost Nebula.' The dust blocks background starlight to form a dark lane, with its tip lit blue by a star. Very faint in surface brightness, it needs dark skies and deep exposure to show the blue against the brown dust, an advanced autumn target."
  focal: "中焦 400–900mm"
