  difficulty: advanced
  summary: "红色气壳包裹亮星的行星状星云。"
  summaryEn: "A small planetary nebula wrapping a hot dying star in a warm red shell."
  description: "蝴蝶结星云(NGC 40,Caldwell 2)距地球约 3500 光年,位于仙王座,是一个小巧的行星状星云。它中央一颗温度高达约 5 万度的明亮垂死恒星,被一圈温暖的红色气壳环绕——这层气体由恒星早先抛出,如今正被中央恒星的强辐射加热而发光。然而星云气体的温度实际上比中央恒星更高,是研究行星状星云物理的有趣样本。哈勃影像显示,约三万年后这层气壳将冷却、消散于星际空间。它长焦下呈现别致而温暖的红橙色调,是仙王座深秋的小型挑战目标。"
  descriptionEn: "The Bow-Tie Nebula (NGC 40, Caldwell 2) lies about 3,500 light-years away in Cepheus and is a small planetary nebula. At its center sits a bright dying star around 50,000 degrees, wrapped in a warm red gas shell that the star expelled earlier and now heats to a glow with its intense radiation. Curiously, the nebula's gas is actually hotter than the central star itself, making it an interesting case for planetary-nebula physics. Hubble imagery indicates that in roughly 30,000 years this shell will cool and disperse into interstellar space. It shows a distinctive warm red-orange hue at long focal lengths, a small challenging target in the late autumn Cepheus sky."
  focal: "长焦 1500mm+"
  image: ngc40
