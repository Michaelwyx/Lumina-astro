  description: "奔跑的鸡星云距地球约 6500 光年,是半人马座 λ 周围的一大片红色发射星云,因整体轮廓似一只奔跑的鸡而得名。星云中嵌有著名的瑟克斯波克球——一群致密的暗尘埃团块,被周围炽热恒星侵蚀。南天视场宽阔,SHO 与 HOO 窄带都能拍出丰富细节。"
  descriptionEn: "About 6,500 light-years away, the Running Chicken Nebula is a large red emission region around Lambda Centauri, named for an outline resembling a running fowl. It hosts the famous Thackeray's Globules — dense dark dust clumps being eroded by surrounding hot stars. The wide southern field renders beautifully in both SHO and HOO narrowband."
