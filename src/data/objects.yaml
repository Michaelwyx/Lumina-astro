  magnitude: 9.6
  hemisphere: north
  season: spring
  difficulty: advanced
  summary: "涡状星系的小伴星系,正被其旋臂勾连。"
  summaryEn: "The dwarf companion tugging on the Whirlpool Galaxy M51's grand arms."
  description: "NGC 5195 距地球约 2500 万光年,位于猎犬座,是涡状星系 M51 的矮伴星系,通常与 M51 同框拍摄。它正从 M51 旋臂后方穿过并与之发生引力相互作用,二者由一条恒星与气体的桥相连。正是这场跨越数亿年的近距离邂逅,潮汐拉扯出了 M51 那对壮丽而规整的宏伟旋臂,使其成为面朝我们的旋涡星系中最上镜的一个。NGC 5195 本身是一个矮椭圆/透镜状星系,核区因相互作用而活跃。它与 M51 共同演绎了星系互动最经典的案例,是春季长焦深空摄影的标志性组合。"
  descriptionEn: "NGC 5195 lies about 25 million light-years away in Canes Venatici and is the dwarf companion of the Whirlpool Galaxy M51, usually imaged together with it. It is passing behind M51's arms and interacting gravitationally, the two linked by a bridge of stars and gas. It is precisely this close encounter, spanning hundreds of millions of years, that tidally drew out M51's magnificent, well-ordered grand-design arms, making it the most photogenic of face-on spirals. NGC 5195 itself is a dwarf elliptical/lenticular galaxy with an active core stirred by the interaction. Together with M51 it stages the classic case study of galactic interaction, a landmark long-focal deep-sky pairing in spring."
  focal: "长焦 1000mm+"
  image: ngc5194
