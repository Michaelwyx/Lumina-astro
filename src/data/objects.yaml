  summary: "南天最壮观的巨型发射星云。"
  summaryEn: "The southern sky's largest, brightest emission nebula, home to volatile Eta Carinae."
  description: "船底座大星云(NGC 3372,Caldwell 92)距地球约 7500 光年,是南天最大、最亮的发射星云,跨度超过 300 光年,规模远超北天的猎户座大星云。它内部藏有银河系最不稳定的特超巨星之一——海山二(Eta Carinae),这颗恒星在 19 世纪 40 年代曾爆发性增亮成为全天第二亮星,并喷出哑铃状的「侏儒星云」。星云中还有哈勃拍摄的著名尘埃柱「神秘山」。整片区域恒星形成极为活跃,O III 与 Hα 信号都极强,色彩与结构震撼无比。它是南半球深空摄影的王牌目标,广角即可拍出全貌,长焦可特写海山二与神秘山。"
  descriptionEn: "The Carina Nebula (NGC 3372, Caldwell 92) lies about 7,500 light-years away and is the largest and brightest emission nebula in the southern sky, spanning over 300 light-years and dwarfing the northern Orion Nebula. It contains Eta Carinae, one of the Milky Way's most unstable supergiants, which flared into the sky's second-brightest star in the 1840s and ejected the dumbbell-shaped Homunculus Nebula. The region also holds the famous Hubble dust pillar known as the Mystic Mountain. Star formation rages throughout, with intense O III and Hα emission yielding overwhelming color and structure. A premier southern-hemisphere deep-sky target, it fits in a wide field while long focal lengths isolate Eta Carinae and the Mystic Mountain."
  focal: "中焦 400–800mm"
  image: carina
