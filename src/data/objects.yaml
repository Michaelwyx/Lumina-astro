  difficulty: intermediate
  summary: "含柱状结构的发射星云与星团。"
  summaryEn: "Emission nebula with a star-forming dust pillar pointing at NGC 6823."
  description: "NGC 6820 是环绕疏散星团 NGC 6823 的发射星云,位于狐狸座,距地球约 6000 光年。星云中一根醒目的尘埃柱(俗称小象鼻)指向中央星团,长约 4 光年,顶端在中央恒星的辐射压下正被压缩并孕育新恒星。NGC 6823 星团仅约两百万年历史,是这片区域的能量来源。红色氢气背景衬托着被雕琢出的柱状亮边,层次丰富。它表面亮度不高,适合用中长焦窄带长曝拍摄出柱状结构的细节。"
  descriptionEn: "NGC 6820 is an emission nebula surrounding the open cluster NGC 6823 in Vulpecula, about 6,000 light-years away. A striking dust pillar (a small 'trunk') roughly four light-years long points toward the central cluster, its tip being compressed by radiation pressure and birthing new stars. The cluster NGC 6823, only about two million years old, powers the region. Sculpted bright-rimmed pillars stand out against a background of red hydrogen, rich in layering. Its modest surface brightness suits long narrowband exposures at medium-to-long focal lengths to draw out the pillar detail."
  focal: "中长焦 800–1200mm"
  image: ngc6820
