  summary: "与北美洲星云相伴的鹈鹕轮廓。"
  summaryEn: "Pelican-shaped emission region beside the North America Nebula."
  description: "鹈鹕星云距地球约 2000 光年,位于天鹅座,与北美洲星云隔着一条暗尘带相望,整体轮廓形似一只鹈鹕。它与北美洲星云实为同一片巨大的电离氢区,由附近一颗炽热恒星照亮,只是被前景尘埃分隔成两块。星云内有活跃的恒星形成区和蜿蜒的电离前沿,著名的「鹈鹕之冠」就是一道正被新生恒星侵蚀的发光气体脊。窄带拍摄下细节极为丰富,红色氢气中点缀着金色亮边。它是天鹅座银河区域最受欢迎的中焦目标之一。"
  descriptionEn: "The Pelican Nebula lies about 2,000 light-years away in Cygnus, facing the North America Nebula across a dark dust lane, its outline resembling a pelican. The two are actually one large ionized hydrogen region lit by a nearby hot star, merely split apart by foreground dust. It hosts active star-forming regions and winding ionization fronts, including the famous 'Pelican's Crown,' a glowing ridge being eroded by newborn stars. Narrowband imaging reveals abundant detail, with golden rims threaded through red hydrogen. It is one of the most popular mid-focal-length targets in the Cygnus Milky Way."
  focal: "中焦 400–800mm"
  image: ic5070
