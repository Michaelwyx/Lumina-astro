  summary: "巨大正面旋涡,旋臂上巨型红色星云遍布。"
  summaryEn: "A giant face-on spiral with many bright pink H II regions along its arms."
  description: "风车星系距地球约 2100 万光年,位于大熊座,直径约 17 万光年,是面朝我们的特大旋涡星系,体量明显大于银河系。它略不对称的旋臂(可能源自与近旁星系的引力相互作用)上散布着众多明亮的巨型 H II 区,如 NGC 5471 等,呈现绚丽的粉红色恒星诞生地。它视面积大、表面亮度尚可、细节丰富,中焦镜头即可拍出壮观全貌。2023 年 5 月,业余天文学家在其旋臂中发现了超新星 SN 2023ixf,使它一度成为全球瞩目的焦点。它是春季北天最具观赏价值的旋涡星系之一。"
  descriptionEn: "The Pinwheel Galaxy lies about 21 million light-years away in Ursa Major, about 170,000 light-years across, a giant face-on spiral noticeably larger than the Milky Way. Its slightly asymmetric arms—likely shaped by interaction with nearby galaxies—are dotted with many bright giant H II regions such as NGC 5471, glowing as vivid pink stellar nurseries. Its large apparent size, decent surface brightness and rich detail let a medium focal length capture a spectacular full view. In May 2023 amateur astronomers discovered the supernova SN 2023ixf in one of its arms, briefly making it a focus of worldwide attention. It is one of the most rewarding spiral galaxies of the northern spring sky."
  focal: "中焦 600–1000mm"
  image: m101-pinwheel
