  summary: "拥有活动星系核与异常红色旋臂。"
  summaryEn: "Spiral galaxy with an active nucleus, megamasers and anomalous arms."
  description: "M106(NGC 4258)距地球约 2350 万光年,位于猎犬座,是一个拥有活动星系核的旋涡星系。其核心藏有质量约 4000 万倍太阳的超大质量黑洞,周围吸积盘中的水分子超脉泽使天文学家得以极精确地测定其距离与黑洞质量,M106 因此成为标定宇宙距离尺度的关键基准星系之一。黑洞喷流将气体加热,在 Hα 与 X 射线波段产生了两条独特的「异常旋臂」。明亮规整的恒星旋臂、尘埃带与周边众多小星系,使它成为长焦深空摄影的热门佳作。"
  descriptionEn: "M106 (NGC 4258) lies about 23.5 million light-years away in Canes Venatici and is a spiral galaxy with an active galactic nucleus. Its core hosts a supermassive black hole of about 40 million solar masses, and water megamasers in the surrounding accretion disk let astronomers measure both its distance and black-hole mass with exceptional precision, making M106 a key benchmark for calibrating the cosmic distance scale. The black hole's jets heat gas to produce two distinctive \"anomalous arms\" seen in Hα and X-rays. Its bright, well-ordered stellar arms, dust lanes, and many small companion galaxies make it a popular long-focal deep-sky subject."
  focal: "长焦 1000mm+"
  image: m106
