  summaryEn: "An edge-on spiral resembling a flying saucer."
  description: "NGC 2683 距地球约 3000 万光年,位于天猫座,是一个近乎侧向的旋涡星系,因其圆盘外形酷似飞碟而被称为「UFO 星系」。它有一个明亮泛黄的核球,盘面前缘点缀着斑驳的尘埃带。明亮紧凑、轮廓鲜明,使它成为冬末春初颇受欢迎的侧向星系摄影目标。"
  descriptionEn: "NGC 2683 lies about 30 million light-years away in Lynx and is a nearly edge-on spiral nicknamed the UFO Galaxy for its saucer-like disk. It shows a bright yellowish bulge with mottled dust lanes silhouetted across the near side of the disk. Bright, compact, and sharply defined, it is a popular edge-on imaging target in late winter and early spring."
