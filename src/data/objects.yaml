  difficulty: intermediate
  summary: "核心极致密的明亮球状星团。"
  summaryEn: "A dense, core-collapsed globular hosting the planetary nebula Pease 1."
  description: "M15(NGC 7078)距地球约 3.3 万光年,位于飞马座,是已知核心最致密的球状星团之一。它的中心曾发生「核心坍缩」,恒星密度向中心急剧聚拢形成尖锐的密度峰,核区可能藏有一个中等质量黑洞。它还是少数内含行星状星云的球状星团——团中的 Pease 1 是 1928 年发现的、首个在球状星团里确认的行星状星云。M15 年龄约 120 亿年,含数十万颗恒星与上百颗变星。结构对称明亮,肉眼勉强可见,是秋季长焦球团摄影中富有看点的目标。"
  descriptionEn: "M15 (NGC 7078) lies about 33,000 light-years away in Pegasus and is one of the densest-core globular clusters known. Its center has undergone \"core collapse,\" with stellar density spiking sharply toward a tight cusp, and the core may harbor an intermediate-mass black hole. It is also one of the few globulars to contain a planetary nebula: Pease 1, discovered in 1928, was the first planetary nebula confirmed within a globular cluster. About 12 billion years old, M15 contains hundreds of thousands of stars and over a hundred variables. Symmetric and bright, just glimpsed with the naked eye, it is a rewarding autumn target for long-focal globular-cluster imaging."
  focal: "长焦 1000mm+"
  image: m15
