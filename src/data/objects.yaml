  summary: "群星排布形似猫头鹰/外星人。"
  summaryEn: "Open cluster shaped like an owl or wide-armed alien (the ET Cluster)."
  description: "猫头鹰星团(NGC 457,又称外星人星团或 ET 星团)距地球约 7900 光年,位于仙后座,是一个明亮有趣的疏散星团。两颗醒目的亮星如同一对眼睛,延伸出的星链则像展开的双臂,整体形似猫头鹰或张臂的外星人 ET。其中那颗最亮的「眼睛」是黄超巨星仙后座 φ,可能并非星团真实成员。星团含数十颗成员星,年龄约两千一百万年。色彩明亮、造型生动,是仙后座秋季中焦摄影与目视都讨喜的人气目标。"
  descriptionEn: "The Owl Cluster (NGC 457, also called the Alien or ET Cluster) lies about 7,900 light-years away in Cassiopeia, a bright and whimsical open cluster. Two prominent stars form a pair of eyes, while trailing star chains look like outstretched arms, giving it the look of an owl or a wide-armed alien. The brightest 'eye,' the yellow supergiant Phi Cassiopeiae, may not actually be a true cluster member. The cluster holds a few dozen stars and is about 21 million years old. Bright and characterful, it is a crowd-pleasing autumn target in Cassiopeia for both imaging and visual observing."
  focal: "中焦 400–800mm"
  image: c13
