  summary: "近邻倾斜旋涡,盘内有著名空洞。"
  summaryEn: "A nearby tilted spiral with a curious star-poor void in its disk."
  description: "NGC 247(Caldwell 62)距地球约 1100 万光年,位于鲸鱼座,是邻近的玉夫座星系群(Sculptor Group)成员之一。它呈高度倾斜的旋涡形态,最引人注目的是盘面北侧有一个奇特的巨大「空洞」——一片几乎没有恒星的稀疏区域,成因至今仍有争议。星系视面积较大、表面亮度偏低,纹理柔和,松散的旋臂上散布着暗弱的恒星结与 H II 区。它是南天值得长曝光的低表面亮度旋涡星系,常与同群的玉夫座星系 NGC 253 一并巡览。"
  descriptionEn: "NGC 247 (Caldwell 62) lies about 11 million light-years away in Cetus and is a member of the nearby Sculptor Group of galaxies. Seen at a high tilt, its most striking feature is a curious large \"void\" on the northern side of the disk, a sparse region almost devoid of stars whose origin is still debated. The galaxy is fairly large on the sky but low in surface brightness, with soft texture and loose arms dotted by faint stellar knots and H II regions. It is a rewarding low-surface-brightness spiral for long exposures in southern skies, often toured alongside its group companion, the Sculptor Galaxy NGC 253."
  focal: "中焦 600–1000mm"
  image: ngc247
