  summary: "教科书般的烟圈状行星状星云。"
  summaryEn: "The textbook smoke-ring planetary nebula in Lyra."
  description: "环状星云距地球约 2300 光年,位于天琴座,是最著名的行星状星云,形如一缕完美的彩色烟圈。它是一颗类太阳恒星演化末期抛出的气壳:垂死恒星的外层被吹离,留下的炽热核心(白矮星)以紫外辐射使气壳发光。气壳由内向外呈现蓝绿色(双电离氧 O III)到橙红色(氮、氢)的渐变环,中心是逐渐冷却的白矮星。它视面虽小(约 1 角分),但表面亮度高,小望远镜中即可见为烟圈状。长焦下其色彩与对称结构极为迷人,深曝还能记录外围暗淡的氢晕。它是夏季行星状星云摄影的经典目标。"
  descriptionEn: "The Ring Nebula lies about 2,300 light-years away in Lyra and is the most famous planetary nebula, shaped like a perfect colored smoke ring. It is the shell of gas cast off by a dying Sun-like star: the star's outer layers were expelled, and the hot remnant core (a white dwarf) lights the shell with ultraviolet radiation. The shell grades from blue-green (doubly ionized oxygen, O III) inward to orange-red (nitrogen and hydrogen) outward, with the cooling white dwarf at its center. Though small (about 1 arcminute), its high surface brightness makes the ring visible even in small telescopes. Under long focal lengths its color and symmetry are captivating, and deep exposures reveal the faint outer hydrogen halo. It is a classic summer planetary-nebula target."
  focal: "长焦 1500mm+"
  image: m57-ring
