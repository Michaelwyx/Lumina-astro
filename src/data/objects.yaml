  difficulty: beginner
  summary: "形似猫爪印的红色发射星云。"
  summaryEn: "A prolific massive-star nursery whose red lobes resemble a cat's paw print."
  description: "猫掌星云(NGC 6334)距地球约 5500 光年,位于天蝎座,因几团明亮的红色发射区排布形似一只猫的脚掌印而得名。它是银河系中产生大质量恒星最旺盛的恒星育婴室之一,造星速度甚至超过著名的猎户座大星云。内部多个嵌埋的恒星形成区已电离出数片 H II 区,新生的大质量恒星每颗约为太阳的十倍,以强辐射在气体中吹胀出一个个发光气泡。星云跨度约 50 光年,红光极其浓郁。它是南天夏季天蝎座中色彩饱满、上镜的窄带目标。"
  descriptionEn: "The Cat's Paw Nebula (NGC 6334) lies about 5,500 light-years away in Scorpius, named for several bright red emission lobes arranged like the print of a cat's paw. It is one of the Milky Way's most prolific nurseries of massive stars, forming new stars even faster than the famous Orion Nebula. Multiple embedded star-forming regions have ionized several H II zones, and newborn massive stars, each roughly ten times the Sun's mass, inflate glowing bubbles in the gas with their intense radiation. The nebula spans about 50 light-years and glows an intense red. It is a richly colored, photogenic narrowband target in the southern summer Scorpius sky."
  focal: "中长焦 800–1200mm"
  image: ngc6334
