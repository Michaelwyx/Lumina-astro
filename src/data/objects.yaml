  summaryEn: "A planetary nebula with jets resembling Saturn's rings."
  description: "土星星云距地球约 5000 光年,是宝瓶座一颗中心白矮星抛出的行星状星云。它呈明亮的青绿色椭圆,两侧伸出尖细的喷流状「ansae」,使其在小望远镜中酷似带环的土星。本体明亮但角径很小,需大口径长焦或自适应处理才能展现喷流细节,是高放大率行星状星云目标。"
  descriptionEn: "About 5,000 light-years away in Aquarius, the Saturn Nebula is a planetary nebula ejected by a central white dwarf. It shows a bright blue-green ellipse with thin jet-like 'ansae' protruding from each end, making it resemble ringed Saturn in small telescopes. Bright but tiny, it needs large aperture and long focal length to reveal the jet detail, a high-magnification planetary target."
