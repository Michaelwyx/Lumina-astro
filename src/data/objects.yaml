  summary: "红蓝交织、燃烧着的恒星之云。"
  summaryEn: "A flaming star lit by runaway AE Aurigae, mixing red emission and blue reflection."
  description: "烈焰之星星云距地球约 1500 光年,位于御夫座,由一颗高温的逃逸恒星 AE Aurigae 照亮。这颗 O 型蓝巨星数百万年前在猎户座区域因双星弹射而被高速抛出,如今正穿越一片与其无关的尘埃云。它罕见地同时呈现红色发射星云(氢气被恒星紫外辐射电离)与蓝色反射星云(尘埃散射星光),色彩交织如同恒星被火焰包裹,因而得名。星云视面约 30 角分,跨度约 5 光年。强烈的红蓝对比使它成为御夫座冬季宽场摄影的视觉亮点,常与邻近的 IC 410 蝌蚪星云同框。"
  descriptionEn: "The Flaming Star Nebula lies about 1,500 light-years away in Auriga and is illuminated by the hot runaway star AE Aurigae. This blue O-type star was ejected from the Orion region millions of years ago and is now plowing through an unrelated cloud of dust. The nebula rarely combines both red emission (hydrogen ionized by the star's ultraviolet light) and blue reflection (starlight scattered by dust), giving it the look of a star wrapped in flames. It spans roughly 30 arcminutes, about 5 light-years across. The vivid red-and-blue contrast makes it a winter wide-field highlight, often framed with the neighboring IC 410 Tadpoles Nebula."
  focal: "中焦 400–800mm"
  image: ic405
