  description: "女巫头星云 IC 2118 距地球约 900 光年,位于波江座,是一团暗淡的蓝色反射星云,被附近的亮星参宿七(猎户座 β)照亮。其轮廓酷似一张仰望的女巫侧脸而得名。星云表面暗弱,需深曝光与暗夜才能呈现淡雅的蓝色尘埃质感,是冬季考验信噪比的反射星云目标。"
  descriptionEn: "About 900 light-years away in Eridanus, the Witch Head Nebula (IC 2118) is a faint blue reflection nebula illuminated by the nearby bright star Rigel (Beta Orionis). Its outline resembles the profile of a witch's face gazing upward. Faint in surface brightness, it needs deep exposure and dark skies to reveal its soft blue dust, a winter test of signal-to-noise."
