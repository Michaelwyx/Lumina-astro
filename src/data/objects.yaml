  difficulty: intermediate
  summary: "银河系的孪生兄弟,巨大絮状棒旋。"
  summaryEn: "A giant flocculent barred spiral often called a twin of the Milky Way."
  description: "孔雀座星系距地球约 3000 万光年,位于南天的孔雀座,是一个巨大的棒旋星系,因结构酷似银河系而被称为「银河系的孪生兄弟」。它的直径约 17.5 万光年,比银河系还大,絮状的旋臂松散展开、缠绕复杂,核区呈拉长的棒状。它身旁带有一个酷似麦哲伦云的扭曲小伴星系 NGC 6744A,二者间存在引力相互作用。它视面积大、面朝我们,中焦镜头即可拍出宏伟全貌,深曝则能展现旋臂中细密的尘埃与恒星形成区。它是南天最上镜的大型旋涡星系之一。"
  descriptionEn: "The Pavo Galaxy lies about 30 million light-years away in the southern constellation Pavo and is a giant barred spiral often called a 「twin of the Milky Way」 for its similar structure. About 175,000 light-years across—larger than our Galaxy—it has loosely spread, intricately wound flocculent arms and an elongated barred core. It is accompanied by the distorted little companion NGC 6744A, reminiscent of a Magellanic Cloud, with which it gravitationally interacts. Large in apparent size and face-on, it shows a magnificent full view even at a medium focal length, while deep exposures reveal fine dust and star-forming regions in the arms. It is one of the most photogenic large spirals in the southern sky."
  focal: "中焦 600–1000mm"
  image: ngc6744
