  magnitude: 9.2
  hemisphere: north
  season: spring
  difficulty: advanced
  summary: "絮状旋臂精致缠绕的“虎眼”星系。"
  summaryEn: "The archetypal flocculent spiral, nicknamed the \"Tiger's Eye\" galaxy."
  description: "NGC 2841 距地球约 4600 万光年,位于大熊座,是「絮状旋涡星系」(flocculent spiral)的典范。它没有贯通的宏伟旋臂,取而代之的是众多由尘埃勾勒、短而细密的旋臂段紧致地缠绕在金黄色核球周围,呈现出锐利如丝的纹理,因而被昵称为「虎眼」。它恒星形成相对温和,缺乏大量明亮的 H II 区,色调偏暖。哈勃望远镜的高分辨影像曾细腻展现其复杂的尘埃花纹。它是长焦高分辨深空摄影的精致目标,适合在春季大熊座区域深曝以呈现层层旋臂。"
  descriptionEn: "NGC 2841 lies about 46 million light-years away in Ursa Major and is the archetype of a flocculent spiral galaxy. Instead of continuous grand-design arms, it shows many short, fine, dust-traced arm segments tightly wound around a golden bulge, giving a sharp, silky texture that earns it the nickname \"Tiger's Eye.\" Star formation is comparatively gentle, lacking abundant bright H II regions, and its tones run warm. Hubble's high-resolution imaging has finely displayed its intricate dust patterns. It is a refined target for high-resolution long-focal deep-sky imaging, rewarding deep exposures in the spring Ursa Major region to reveal its layered arms."
  focal: "长焦 1000mm+"
  image: ngc2841
