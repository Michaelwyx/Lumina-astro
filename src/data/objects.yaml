  summary: "形似郁金香花苞的发射星云。"
  summaryEn: "Tulip-shaped emission nebula near the black hole Cygnus X-1."
  description: "郁金香星云(Sh2-101)距地球约 6000 光年,位于天鹅座,因明亮的红色氢气勾勒出郁金香花苞般的轮廓而得名。它由附近一颗炽热的 O 型恒星 HDE 227018 电离发光,是天鹅座 OB3 星协的一部分。星云视野内就坐落着银河系著名的恒星级黑洞天鹅座 X-1——黑洞从伴星吸积物质并喷出高速气流,在星云气体中激波出一道弧形结构。窄带拍摄可呈现花瓣层次与 OIII 蓝绿色调。它是夏季天鹅座中精致的中长焦目标。"
  descriptionEn: "The Tulip Nebula (Sh2-101) lies about 6,000 light-years away in Cygnus, named for the red hydrogen that outlines a tulip-bud shape. It is ionized by the nearby hot O-type star HDE 227018 and belongs to the Cygnus OB3 association. Within the same field sits the famous stellar-mass black hole Cygnus X-1, which accretes gas from a companion and drives a jet that shocks an arc into the nebula's gas. Narrowband imaging reveals petal layering and teal OIII tones. It is a refined medium-to-long-focal-length target in summer Cygnus."
  focal: "中长焦 800–1200mm"
  image: sh2101
