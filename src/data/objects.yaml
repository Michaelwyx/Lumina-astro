  magnitude: 4
  hemisphere: both
  season: winter
  difficulty: beginner
  summary: "全天最亮的弥漫星云,新手首选。"
  summaryEn: "The brightest diffuse nebula in the sky and the top beginner target."
  description: "猎户座大星云距地球约 1340 光年,是离我们最近的大质量恒星诞生地,也是夜空中最亮、最易拍摄的弥漫星云,肉眼即可在猎户腰带下方看到。它是一片直径约 24 光年的电离氢区,核心的四合星(Trapezium)以强紫外辐射电离并照亮周围气体,呈现明亮的红粉与蓝绿色调。星云内藏有数百颗新生恒星与原行星盘(proplyds),是研究恒星与行星系统形成的天然实验室。它表面亮度高、动态范围极大,短曝光即可出片,深曝则需多重曝光合成以保留核心细节。它是天文摄影入门的第一目标,几乎所有器材都能拍出令人惊艳的结果。"
  descriptionEn: "The Orion Nebula lies about 1,340 light-years away and is the nearest region of massive star birth, as well as the brightest and easiest diffuse nebula to photograph, visible to the naked eye below Orion's Belt. It is an ionized hydrogen region roughly 24 light-years across, lit and ionized by the Trapezium multiple star at its core, glowing in vivid pink-red and blue-green hues. The nebula hosts hundreds of forming stars and protoplanetary disks (proplyds), making it a natural laboratory for studying star and planet formation. Its high surface brightness and enormous dynamic range yield images in short exposures, though deep shots need HDR blending to preserve the core. It is the classic first target in astrophotography, delivering striking results with almost any equipment."
  focal: "中焦 400–800mm"
  image: m42-orion
