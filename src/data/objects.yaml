  summaryEn: "A spindle hosting a billion-solar-mass black hole."
  description: "NGC 3115 距地球约 3200 万光年,位于六分仪座,是一个侧向呈现的透镜状星系,因细长纺锤形而得名。它的核心藏有一个约 20 亿太阳质量的超大质量黑洞,是已知离地球最近的十亿级黑洞。星系平滑泛黄、两端尖锐,长焦可拍出其优雅对称的纺锤剪影。"
  descriptionEn: "NGC 3115 lies about 32 million light-years away in Sextans and is an edge-on lenticular galaxy named for its tapered spindle shape. At its core lurks a supermassive black hole of roughly two billion solar masses, the nearest billion-solar-mass black hole known. Smooth and golden with sharply pointed ends, it presents an elegant symmetric spindle silhouette at long focal lengths."
  focal: "长焦 1000–2000mm"
