  hemisphere: north
  season: autumn
  difficulty: beginner
  summary: "全天最亮旋涡星系,肉眼可见,业余首选。"
  summaryEn: "The brightest spiral galaxy in the sky, naked-eye and a top beginner target."
  description: "仙女座大星系距地球约 250 万光年,是离银河系最近的大型旋涡星系,也是本星系群中质量最大的成员,直径约 22 万光年,在天空中跨度达 3° 多(约六个满月宽)。它视面积巨大、核心明亮,旋臂中清晰可见暗尘带与粉红色的 H II 区,身旁还伴有椭圆矮星系 M32 与 M110。它正以约每秒 110 公里的速度朝银河系接近,预计约 45 亿年后两者将开始并合。它是肉眼可见最遥远的天体之一,短焦镜头即可拍下整个星系及其伴星系。它是星系摄影的入门标杆,也是研究星系结构的经典对象。"
  descriptionEn: "The Andromeda Galaxy lies about 2.5 million light-years away and is the nearest large spiral galaxy to the Milky Way, the most massive member of the Local Group, about 220,000 light-years across and spanning over 3° in the sky (roughly six Moon-widths). Its large apparent size, bright core and spiral arms reveal clear dust lanes and pink H II regions, accompanied by the dwarf elliptical satellites M32 and M110. It is approaching the Milky Way at about 110 km/s and is expected to begin merging with our Galaxy in roughly 4.5 billion years. One of the most distant objects visible to the naked eye, it fits a short focal length that captures the whole galaxy with its companions. It is the benchmark beginner galaxy and a classic subject for studying galactic structure."
  focal: "短焦 135–400mm"
  image: m31-andromeda
