  summary: "1054 年超新星爆发的著名残骸。"
  summaryEn: "The famous remnant of the supernova recorded in 1054 AD."
  description: "蟹状星云(M1,NGC 1952)是公元 1054 年那颗被中国、日本等多地天文学家记录的「客星」超新星爆发后留下的残骸,距地球约 6500 光年,位于金牛座。它是首个被确认与历史超新星对应的天体,梅西耶 1758 年观测它时萌生了编纂星云星团表的想法,使之成为梅西耶天体表的第一号。星云由丝状的红色发射气体与弥漫的蓝色同步辐射构成,中心是一颗每秒自转约 30 次、剧烈跳动的蟹状星云脉冲星(中子星)。作为历史最著名的超新星遗迹,它在长焦下细节惊人,科学与观赏价值兼具。"
  descriptionEn: "The Crab Nebula (M1, NGC 1952) is the remnant of the \"guest star\" supernova recorded in 1054 AD by astronomers in China, Japan and elsewhere, lying about 6,500 light-years away in Taurus. It was the first object confirmed to match a historical supernova, and Messier's 1758 observation of it sparked the idea for his catalog, making it entry number one. The nebula combines filamentary red emission gas with diffuse blue synchrotron radiation, and at its center beats the Crab Pulsar, a neutron star spinning about 30 times per second. As the most famous supernova remnant in history, it shows astonishing detail at long focal lengths, prized for both science and beauty."
  focal: "长焦 1500mm+"
  image: m1-crab
