  magnitude: 9.4
  hemisphere: both
  season: autumn
  difficulty: advanced
  summary: "对称完美的宏伟旋涡,表面暗淡。"
  summaryEn: "Textbook grand-design spiral, faint but perfectly symmetric."
  description: "幻影星系距地球约 3200 万光年,位于双鱼座,是教科书级的「宏伟设计」旋涡星系。两条对称而清晰的旋臂从核心优雅展开,旋臂上点缀着粉红色 H II 区和蓝色年轻星团。它含约一千亿颗恒星,几乎完全正对我们,结构工整对称。它表面亮度很低,是梅西耶天体中目视难度最高的之一,需要极暗的天空与长曝光。它是哈勃与 JWST 的经典成像目标,后者的红外影像揭示出旋臂中丝缕分明的尘埃骨架。"
  descriptionEn: "The Phantom Galaxy lies about 32 million light-years away in Pisces, a textbook grand-design spiral. Two symmetric, well-defined arms sweep gracefully from the core, dotted with pink H II regions and blue young clusters. Containing roughly 100 billion stars, it is nearly perfectly face-on and tidily symmetric. Its very low surface brightness makes it one of the hardest Messier objects to see visually, demanding very dark skies and long exposures. A classic Hubble and JWST imaging target, the latter's infrared view revealed a delicate filamentary dust skeleton in the arms."
  focal: "长焦 1000mm+"
  image: m74
