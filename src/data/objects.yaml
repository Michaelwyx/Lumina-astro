  season: winter
  difficulty: intermediate
  summary: "轮廓形似猴头的红色星云。"
  summaryEn: "Red emission nebula sculpted into the profile of a monkey's head."
  description: "猴头星云(NGC 2174)距地球约 6400 光年,位于猎户座北部边缘,因被恒星辐射雕琢出的尘埃轮廓形似一只猴子的侧脸而得名。它是一处活跃的恒星形成区,内部年轻的疏散星团释放强烈的星风与紫外辐射,在气体中吹出空腔并塑造出密集发光的尘埃柱与亮边。星云以红色氢发射为主,跨度约数十光年。哈勃望远镜曾对其内部的尘埃柱拍摄过著名特写。它适合冬季 SHO 窄带拍摄,是色彩与结构兼具的上镜目标。"
  descriptionEn: "The Monkey Head Nebula (NGC 2174) lies about 6,400 light-years away on the northern edge of Orion, named for dust contours sculpted by stellar radiation into the profile of a monkey's face. It is an active star-forming region where a young embedded open cluster drives powerful winds and ultraviolet radiation, carving cavities in the gas and shaping dense, glowing dust pillars and bright rims. Dominated by red hydrogen emission, it spans several tens of light-years. Hubble has captured a famous close-up of its interior pillars. It suits winter SHO narrowband imaging well and is a photogenic target rich in both color and structure."
  focal: "中长焦 800–1200mm"
  image: ngc2174
- id: NGC3372
  name: "海山二与神秘山"
  nameEn: "Eta Carinae / Mystic Mountain"
  catalog: NGC
  type: emission-nebula
  typeLabel: "发射星云"
  constellation: "船底座 Car"
  ra: "10h45m"
  dec: -59
  decLabel: "−59°"
  magnitude: 1
  hemisphere: south
  season: spring
  difficulty: beginner
  summary: "船底星云核心的爆发恒星区。"
  summaryEn: "The explosive core of the Carina Nebula, home of the supergiant Eta Carinae."
  description: "NGC 3372 是船底座大星云的正式编号,核心区藏有著名的特超巨星海山二(Eta Carinae)。海山二是一对极不稳定的大质量双星,在 19 世纪 40 年代曾爆发性增亮成全天第二亮星,随后喷出哑铃状的「侏儒星云」(Homunculus Nebula),如今仍在向两侧膨胀。星云距地球约 7500 光年,整体跨度超过 300 光年,远大于猎户座大星云,内部还有著名的「神秘山」——一根约三光年高、被辐射雕琢的尘埃柱。该区域是南天最大、最亮的发射星云中最戏剧化、最上镜的细节,色彩与结构极其震撼。它适合用长焦做特写,展现海山二与侏儒星云的爆发遗迹。"
  descriptionEn: "NGC 3372 is the formal designation of the Carina Nebula, whose core harbors the famous luminous supergiant Eta Carinae. Eta Carinae is a wildly unstable massive binary that flared into the sky's second-brightest star in the 1840s, then ejected the dumbbell-shaped Homunculus Nebula that is still expanding today. The nebula lies about 7,500 light-years away and spans over 300 light-years, far larger than the Orion Nebula, and also contains the celebrated 「Mystic Mountain,」 a radiation-sculpted dust pillar about three light-years tall. This is the most dramatic and photogenic detail within the largest, brightest emission nebula in the southern sky, with stunning color and structure. It rewards long-focus close-ups that reveal Eta Carinae and its eruptive remnant."
  focal: "中长焦 800–1200mm"
  image: ngc3372
