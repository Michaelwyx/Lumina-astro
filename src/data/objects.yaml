  summaryEn: "A ringed barred spiral in the Leo I group."
  description: "M95 距地球约 3300 万光年,是狮子座 I 星系群的成员,呈一个近乎正面的棒旋星系。其中央短棒两端连接着一圈近乎完美的恒星形成环,使它在长焦下呈现「希腊字母 θ」般的几何美感。星系亮度中等,适合作为狮子座春季星系巡游的进阶目标。"
  descriptionEn: "M95 lies about 33 million light-years away as a member of the Leo I group and is a nearly face-on barred spiral. Its central bar connects to an almost perfect circular ring of star formation, giving it a striking theta-shaped geometry at long focal lengths. Moderately bright, it is a fine intermediate target during a spring tour of Leo's galaxies."
  focal: "长焦 1000–2000mm"
