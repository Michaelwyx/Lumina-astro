  hemisphere: north
  season: spring
  difficulty: advanced
  summary: "完美侧向旋涡,细长如针带尘埃带。"
  summaryEn: "Spectacular edge-on spiral, slim as a needle with a central dust lane."
  description: "针状星系距地球约 3000 至 5000 万光年,位于后发座,是天空中最壮观的侧向旋涡星系之一。它的盘面极薄而细长,视面长达约 16 角分,一道清晰的暗尘埃带横贯全长,中央拱起一个明亮硕大的核球。它实际直径约 10 万光年,与银河系相当,被誉为从侧面看银河系的「镜像」。它视星等约 10 等,是较亮且容易辨认的侧向星系。长焦拍摄锐利如针、几何美感极强,是后发座春季星系摄影的标志性目标。"
  descriptionEn: "The Needle Galaxy lies roughly 30 to 50 million light-years away in Coma Berenices, one of the most spectacular edge-on spirals in the sky. Its disk is extremely thin and elongated, spanning about 16 arcminutes, with a clear dark dust lane running its full length and a large, bright bulge arching at the center. About 100,000 light-years across like the Milky Way, it is often called a 'mirror' of our galaxy seen edge-on. At magnitude 10 it is a relatively bright, easily recognized edge-on system. Razor-sharp and geometrically striking at long focal lengths, it is a signature spring galaxy target in Coma Berenices."
  focal: "长焦 1000mm+"
  image: ngc4565
