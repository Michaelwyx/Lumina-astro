  difficulty: beginner
  summary: "全天第二亮的壮丽球状星团。"
  summaryEn: "The sky's second-brightest globular cluster, a golden swarm near the SMC."
  description: "杜鹃座47(C106,NGC 104)距地球约 1.3 万光年,是仅次于半人马ω的全天第二亮球状星团,肉眼可见为一团明亮的星状光斑。它含有数百万颗恒星,核心极度致密,星密度向中心急剧攀升,整体呈温暖的金黄色调。团中还藏有大量毫秒脉冲星和可能的中等质量黑洞,是研究恒星动力学的重要实验室。它在天空中正位于小麦哲伦云附近,二者常在南天深空广角中同框,是南半球摄影里相映成趣的瑰宝。长焦下可分解出令人窒息的密集星海。"
  descriptionEn: "47 Tucanae (C106, NGC 104) lies about 13,000 light-years away and is the second-brightest globular cluster in the entire sky after Omega Centauri, visible to the naked eye as a bright star-like glow. It contains millions of stars and an extremely dense core where stellar density climbs steeply toward the center, glowing an overall warm gold. The cluster hosts many millisecond pulsars and a possible intermediate-mass black hole, making it a key laboratory for stellar dynamics. It sits near the Small Magellanic Cloud on the sky, the two often framed together in southern wide-field deep-sky shots, a complementary jewel of southern-hemisphere imaging. Long focal lengths resolve a breathtakingly dense sea of stars."
  focal: "中长焦 800–1200mm"
  image: 47tuc
