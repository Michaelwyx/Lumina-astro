  summary: "目视会「闪烁」的青色行星状星云。"
  summaryEn: "Teal planetary nebula that appears to 'blink' at the eyepiece."
  description: "闪视行星状星云距地球约 2200 光年,位于天鹅座,是一个明亮小巧的行星状星云。它因中央恒星异常明亮,使观测者在直视与侧视(余光)之间切换时,星云似乎在明灭闪烁,因而得名「闪视行星状星云」。其主体呈青绿色圆盘,由垂死恒星抛出的气壳构成。哈勃影像揭示出星云两侧有一对红色的「快速低电离发射区」结点(FLIERs),正以超音速向外喷射。它视星等约 8.8 等,是天鹅座中精致而上镜的长焦目标。"
  descriptionEn: "The Blinking Planetary lies about 2,200 light-years away in Cygnus, a bright, compact planetary nebula. Its central star is so bright that the nebula seems to flicker on and off as an observer switches between direct and averted vision, hence its name. Its body is a teal disk formed from gas shed by a dying star. Hubble imaging revealed a pair of red Fast Low-Ionization Emission Regions (FLIERs) flanking it, shooting outward at supersonic speeds. At magnitude 8.8 it is a refined and photogenic long-focal-length target in Cygnus."
  focal: "长焦 1500mm+"
  image: ngc6826
