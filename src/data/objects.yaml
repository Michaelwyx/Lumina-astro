  summary: "巨蟹座中肉眼可见的疏散星团。"
  summaryEn: "One of the nearest open clusters, a naked-eye swarm in Cancer."
  description: "蜂巢星团(M44,鬼星团 Praesepe)距地球约 580 光年,位于巨蟹座,是离我们最近的疏散星团之一,肉眼下呈一团朦胧光斑,自古便为人所知。它包含约一千颗恒星,视面积比满月大三倍,年龄约六亿年。有趣的是,它与著名的毕星团(Hyades)年龄相近、自行方向一致,被认为可能源自同一片星云。团中已发现多颗系外行星。因其分布开阔而明亮,适合广角到中焦拍摄出群星璀璨的效果,是春季夜空中老少咸宜的人气目标。"
  descriptionEn: "The Beehive Cluster (M44, Praesepe) lies about 580 light-years away in Cancer and is one of the nearest open clusters to us, appearing to the naked eye as a hazy patch known since antiquity. It contains roughly a thousand stars, covers three times the area of the full moon, and is about 600 million years old. Intriguingly, it shares a similar age and common proper motion with the famous Hyades, suggesting both may have formed from the same cloud. Several exoplanets have been found among its stars. Open and bright in its distribution, it suits wide-field to medium focal imaging that brings out a glittering field of stars, a crowd-pleasing spring target."
  focal: "广角/中焦 135–400mm"
  image: m44-beehive
