  difficulty: beginner
  summary: "七姊妹蓝色星团裹着蓝色尘埃。"
  summaryEn: "The Seven Sisters, a bright blue cluster veiled in blue reflection nebulosity."
  description: "昴星团又称七姊妹,距地球约 444 光年,位于金牛座,是最著名、最易辨认的疏散星团,肉眼可见六到七颗亮星。它是一个相对年轻(约 1 亿年)的星团,包含上千颗恒星,其中最亮的为炽热的蓝白色 B 型巨星。这些明亮恒星正穿过一片偶然相遇的星际尘埃云,星光被尘埃散射出梦幻的蓝色反射星云,深曝光下尘埃丝缕分明。它在世界各地的神话与历法中都有重要地位,日本称之为「昴」(Subaru)。它视面约 2°,适合中焦镜头拍摄,是冬季最上镜的入门目标之一。"
  descriptionEn: "The Pleiades, also called the Seven Sisters, lie about 444 light-years away in Taurus and form the most famous and recognizable open cluster, with six or seven stars visible to the naked eye. A relatively young cluster (about 100 million years old), it contains over a thousand stars, the brightest being hot blue-white B-type giants. These luminous stars are passing through a chance-encountered interstellar dust cloud, scattering their light into a dreamy blue reflection nebula whose filaments emerge in deep exposures. It holds an important place in mythologies and calendars worldwide and is called Subaru in Japan. Spanning about 2°, it suits a medium focal length and is one of winter's most photogenic beginner targets."
  focal: "中焦 400–800mm"
  image: m45-pleiades
