  summaryEn: "A bright planetary with intricate nested shells."
  description: "猫眼星云距地球约 3300 光年,是天龙座一颗濒死恒星抛出的行星状星云,以结构极其复杂著称。其明亮的核心呈猫眼状蓝绿色,外围环以一层层同心气壳与喷流。本体明亮但角径小,长焦能展现核心精细的结构,深曝光可拍出巨大的暗淡外晕,是夏季高人气的行星状星云。"
  descriptionEn: "About 3,300 light-years away in Draco, the Cat's Eye Nebula is a planetary nebula ejected by a dying star, famous for its extremely intricate structure. Its bright blue-green core has a cat's-eye shape ringed by concentric shells and jets. Bright but small, it reveals fine core detail at long focal length, while deep exposure shows a huge faint outer halo, a popular summer planetary."
  focal: "长焦 1500mm+"
