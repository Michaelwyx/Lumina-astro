  magnitude: 6.4
  hemisphere: south
  season: summer
  difficulty: intermediate
  summary: "含「龙虾」造型的恒星形成区。"
  summaryEn: "A star-forming nebula with the hot cluster Pismis 24, aka the Lobster."
  description: "战争与和平星云(又称龙虾星云)距地球约 5500–8000 光年,是天蝎座中一处大质量恒星诞生的发射星云,常与邻近的猫掌星云 NGC 6334 同框。它的「战争与和平」之名源自中途空间实验(MSX)的红外影像——西部形似和平鸽,东部状如骷髅;在可见光中则因气体云的轮廓得「龙虾」之称。星云中央嵌有疏散星团 Pismis 24,团中含有银河系已知最炽热、最大质量的几颗恒星,其强烈辐射雕琢出复杂的气体尘埃柱与空腔。红光浓郁、结构丰富,是南天夏季窄带 SHO 摄影的精彩目标。"
  descriptionEn: "The War and Peace Nebula (also the Lobster Nebula) lies about 5,500–8,000 light-years away in Scorpius, a region of massive star birth often framed with the neighboring Cat's Paw Nebula (NGC 6334). Its 「War and Peace」 name comes from Midcourse Space Experiment infrared images, in which the western part resembles a dove and the eastern part a skull, while in visible light its cloud outline earned the 「Lobster」 nickname. At its center sits the open cluster Pismis 24, home to some of the hottest, most massive stars known in the Milky Way, whose fierce radiation carves intricate dust pillars and cavities. Richly red and structured, it is a rewarding target for southern summer SHO narrowband imaging."
  focal: "中长焦 800–1200mm"
  image: ngc6357
