  summary: "中心镶嵌星团的红色玫瑰。"
  summaryEn: "Vast red rose-shaped nebula encircling young cluster NGC 2244."
  description: "玫瑰星云距地球约 5200 光年,是一团直径达 130 光年的巨大红色发射星云,位于麒麟座。它环绕着中心年轻的疏散星团 NGC 2244,星团内炽热 O 型恒星的强紫外辐射与恒星风电离并吹空了中央气体,塑造出完美的玫瑰花环造型。星云总质量约相当于一万个太阳,是银河系中活跃的恒星育婴室之一。窄带 SHO 拍摄能呈现层次丰富的花瓣结构与暗博克球。它视面比满月还大,是冬季宽视场摄影的明星目标。"
  descriptionEn: "The Rosette Nebula lies about 5,200 light-years away in Monoceros and spans some 130 light-years across. It surrounds the young open cluster NGC 2244, whose hot O-type stars ionize the gas and have blown out a central cavity, sculpting the perfect rose-like ring. Containing the mass of roughly 10,000 Suns, it is one of the Galaxy's active stellar nurseries. Narrowband SHO imaging reveals rich petal structure and dark Bok globules. Larger than the full Moon on the sky, it is a star target for winter wide-field astrophotography."
  focal: "中焦 400–800mm"
  image: rosette
