  difficulty: advanced
  summary: "结构完美的棒旋,哈勃经典肖像。"
  summaryEn: "The textbook archetype of a barred spiral, immortalized by a Hubble portrait."
  description: "NGC 1300 距地球约 6900 万光年,位于波江座,是棒旋星系的标准原型,被视为该类星系最完美的样板之一。一条笔直的恒星棒贯穿明亮核心,两端各连接着一条对称缠绕的宏伟旋臂。它最奇特之处在于核区还内嵌着一段直径仅约 3300 光年的微缩「宏伟设计」螺旋结构,这在棒旋星系中颇为罕见。哈勃望远镜曾为它拍摄了一幅极著名的高清全景肖像,展现出令人惊叹的旋臂与尘埃细节。它表面亮度偏低,是春冬之交长焦深空摄影中结构精美绝伦的挑战性目标。"
  descriptionEn: "NGC 1300 lies about 69 million light-years away in Eridanus and is the textbook archetype of a barred spiral, regarded as one of the finest examples of its kind. A straight stellar bar runs through the bright core, with a symmetric, tightly wound grand-design arm springing from each end. Its most unusual feature is a miniature \"grand-design\" spiral only about 3,300 light-years across nested within the nucleus, rare among barred spirals. Hubble captured a famous high-resolution portrait of it, revealing stunning arm and dust detail. Low in surface brightness, it is an exquisitely structured yet challenging long-focal deep-sky target around the turn of winter to spring."
  focal: "长焦 1000mm+"
  image: ngc1300
