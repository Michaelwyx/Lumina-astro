  summary: "暗尘缺口形似吃豆人的红色星云。"
  summaryEn: "Red emission nebula whose dark dust notch resembles the arcade character Pac-Man."
  description: "吃豆人星云(NGC 281)距地球约 9200 光年,位于仙后座,因一道暗尘缺口使整体轮廓酷似游戏角色「吃豆人」而得名。星云中央镶嵌着年轻疏散星团 IC 1590,团中的炽热多星系统释放强紫外辐射,电离周围气体并使其发出红光。星云边缘点缀着被辐射雕琢、轮廓清晰的暗博克球(Bok globules)——正是新恒星诞生的孵化场。它以红色氢发射为主,跨度约 50 光年。该天体非常适合 SHO 窄带合成,能凸显经典的「吃豆人」造型,是仙后座秋季人气目标。"
  descriptionEn: "The Pacman Nebula (NGC 281) lies about 9,200 light-years away in Cassiopeia, named for a dark dust notch that makes its outline resemble the arcade character Pac-Man. Embedded at its center is the young open cluster IC 1590, whose hot multiple-star system pours out ultraviolet radiation that ionizes the surrounding gas and makes it glow red. Its edges are dotted with sharply sculpted dark Bok globules, the very cradles where new stars are born. Dominated by red hydrogen emission, the nebula spans roughly 50 light-years. It suits SHO narrowband processing well, which accentuates the classic Pac-Man shape, making it a popular autumn Cassiopeia target."
  focal: "中长焦 800–1200mm"
  image: ngc281
