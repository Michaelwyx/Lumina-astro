  descriptionEn: "About 1,500 light-years away just above the Orion Nebula (M42), the Running Man Nebula (NGC 1977) is a striking blue reflection nebula. Dark dust within the blue glow traces the silhouette of a running figure, giving it its name. Almost always framed with M42 and M43, its blue-red contrast makes it a favorite companion in wide-field winter imaging."
