  difficulty: intermediate
  summary: "形似巫师侧影的发射星云。"
  summaryEn: "An emission nebula shaped like a robed wizard, around cluster NGC 7380."
  description: "巫师星云距地球约 7200 光年,位于仙王座,环绕年轻疏散星团 NGC 7380,因气体与尘埃的整体轮廓形似一位戴尖帽、张开斗篷的巫师而得名。星团年龄仅数百万年,其大质量恒星以强烈的星风和紫外辐射电离周围氢气并塑造出密集的尘埃柱与电离亮边。星云主体由发射红光的氢气主导,跨度约 100 光年,在窄带 SHO 影像中结构层次丰富。它表面亮度中等,适合中长焦配合窄带滤镜拍摄。它是仙王座秋季银河中颇受欢迎的造型类目标。"
  descriptionEn: "The Wizard Nebula lies about 7,200 light-years away in Cepheus and surrounds the young open cluster NGC 7380, named for the way its gas and dust resemble a robed, pointy-hatted wizard. The cluster is only a few million years old, and its massive stars ionize the surrounding hydrogen and sculpt dense dust pillars and bright ionization rims with their strong winds and ultraviolet radiation. The nebula's body is dominated by red-emitting hydrogen, spans roughly 100 light-years, and shows rich layered structure in SHO narrowband images. With moderate surface brightness, it suits a medium-to-long focal length paired with narrowband filters. It is a popular shape-based target in the autumn Cepheus Milky Way."
  focal: "中长焦 800–1200mm"
  image: ngc7380
