  summary: "御夫座中最丰富的疏散星团。"
  summaryEn: "The richest of Auriga's open clusters, ~500 stars with an orange giant."
  description: "M37 距地球约 4500 光年,位于御夫座,是御夫座三个梅西耶疏散星团中最丰富、最明亮的一个,含约五百颗恒星。它年龄约四到五亿年,中心一颗橙红色的巨星在众多蓝白群星中格外醒目。星点密集均匀,如同撒落的盐粒铺满视场,在小望远镜中观感极佳。它视星等约 5.6 等,镶嵌在冬季银河丰富的星场中。它是冬季御夫座中赏心悦目、易于拍摄与观测的星团目标。"
  descriptionEn: "M37 lies about 4,500 light-years away in Auriga, the richest and brightest of the constellation's three Messier open clusters, holding roughly 500 stars. Aged around 400 to 500 million years, it features a prominent orange-red giant standing out among many blue-white members. Its dense, even star field looks like scattered salt grains filling the eyepiece, lovely in small telescopes. At magnitude 5.6 it is embedded in the rich star fields of the winter Milky Way. It is a delightful, easy cluster target in winter Auriga for both imaging and visual observing."
  focal: "中焦 400–800mm"
  image: m37
