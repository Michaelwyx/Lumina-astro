  summary: "内含两条「蝌蚪」尘埃柱。"
  summaryEn: "Red emission nebula holding two comet-like dust 'tadpoles'."
  description: "蝌蚪星云距地球约 12000 光年,是御夫座中一片巨大的红色发射星云,环绕着年轻疏散星团 NGC 1893。星云内部有两条被恒星风与辐射雕琢、拖着尾巴的致密尘埃团,形似游动的蝌蚪,长约 10 光年,正朝远离星团的方向被推开。星团成员的强辐射不断电离周围氢气,使其发出明亮红光。它常与邻近的 IC 405 烈焰之星星云同框出现。红色氢气主导、结构鲜明,是御夫座窄带摄影的人气目标。"
  descriptionEn: "IC 410 lies about 12,000 light-years away in Auriga, a large red emission nebula surrounding the young open cluster NGC 1893. Inside it are two dense, sculpted dust knots trailing tails like swimming tadpoles, each roughly 10 light-years long and being pushed away from the cluster by stellar winds. Intense radiation from the cluster stars continually ionizes the surrounding hydrogen, making it glow bright red. It often shares the frame with the nearby Flaming Star Nebula (IC 405). Hydrogen-dominated and rich in structure, it is a favorite Auriga narrowband target."
  focal: "中长焦 800–1200mm"
