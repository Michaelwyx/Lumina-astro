  description: "NGC 2264 距地球约 2700 光年,是麒麟座一处集多种天体于一身的恒星形成区。它包含三角形的圣诞树星团、其尖端下方著名的锥状暗尘柱,以及波浪般的「狐皮星云」反射/发射结构。红色氢气、蓝色反射光与暗尘交织,层次极为上镜,是冬季中焦的人气目标。"
  descriptionEn: "About 2,700 light-years away in Monoceros, NGC 2264 is a star-forming region packing several icons into one frame: the triangular Christmas Tree Cluster, the dark Cone Nebula pillar at its apex, and the swirling Fox Fur Nebula. Red hydrogen, blue reflection light and dark dust interweave into a richly layered, highly photogenic winter target."
