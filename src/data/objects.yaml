  description: "意面星云 Simeis 147(Sh2-240)距地球约 3000 光年,横跨金牛座与御夫座边界,是约 4 万年前超新星爆发留下的遗迹。它直径达 3 度,纤细的红蓝丝缕如一团乱面般缠绕。表面极其暗弱,需极暗夜空、宽视场短焦与多夜窄带积累才能呈现丝缕全貌,是冬季终极挑战目标之一。"
  descriptionEn: "About 3,000 light-years away across the Taurus–Auriga border, the Spaghetti Nebula (Simeis 147, Sh2-240) is the remnant of a supernova roughly 40,000 years ago. Spanning 3 degrees, its thin red and blue filaments tangle like a plate of spaghetti. Extremely faint in surface brightness, it needs very dark skies, a wide short-focal field and many nights of narrowband integration to reveal the full web, an ultimate winter challenge."
