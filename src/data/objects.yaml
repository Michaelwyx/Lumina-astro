  difficulty: beginner
  summary: "哈勃「创生之柱」所在的星云。"
  summaryEn: "Home of Hubble's iconic Pillars of Creation, a stellar nursery in Serpens."
  description: "鹰状星云距地球约 5700 光年(早期估计约 7000 光年,后经盖亚数据修正),位于巨蛇座,因哈勃望远镜 1995 年拍摄的「创生之柱」而举世闻名。这些高耸数光年的气体尘埃柱是恒星正在诞生的孵化场,顶端常嵌有正在凝聚的「蒸发气态球」(EGGs)。星云整体跨度约 70×55 光年,周围被疏散星团 NGC 6611 中炽热的年轻恒星电离成明亮的红色,星云本体在星表中又编号为 IC 4703。它在小望远镜中即可见星团,长焦窄带拍摄则能还原标志性的柱状结构。它是夏季银河深处最具科学意义与观赏价值的目标之一。"
  descriptionEn: "The Eagle Nebula lies about 5,700 light-years away in Serpens (an older estimate of 7,000 ly was revised down with Gaia data) and is world-famous for Hubble's 1995 「Pillars of Creation.」 These towering columns of gas and dust, several light-years tall, are active stellar nurseries whose tips hold collapsing evaporating gaseous globules (EGGs). The nebula spans roughly 70 by 55 light-years, ionized into a glowing red by the hot young stars of cluster NGC 6611; the nebulosity itself is catalogued as IC 4703. The cluster is visible in small telescopes, while long-focus narrowband imaging recovers the iconic pillars. It is among the most scientifically meaningful and rewarding targets in the summer Milky Way."
  focal: "中长焦 800–1200mm"
  image: eagle-pillars
