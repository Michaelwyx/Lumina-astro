  description: "NGC 2997 距地球约 3500 万光年,位于南天的唧筒座,是一个正向呈现的宏伟大旋涡星系。它拥有缠绕优雅的旋臂,沿臂分布着一连串粉红色的恒星形成区,核心被一圈年轻星团环绕。盘面大而明亮,是南半球深空摄影中最上镜的正向星系之一。"
  descriptionEn: "NGC 2997 lies about 35 million light-years away in the southern constellation Antlia and is a magnificent face-on grand-design spiral. Its gracefully sweeping arms are studded with strings of pink star-forming regions, and a ring of young clusters encircles the core. Large and bright in face-on view, it is one of the most photogenic spirals of the southern sky."
