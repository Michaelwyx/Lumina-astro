  summary: "蓝色尘埃中的奔跑人影。"
  summaryEn: "Blue reflection nebula whose dark dust traces a running figure."
  description: "奔跑人星云(Sh2-279)距地球约 1500 光年,位于猎户座大星云正北方,是猎户座大星云复合体的一部分。它主要是一片蓝色反射星云,其中嵌着一小块红色发射区;暗尘的分布酷似一个奔跑的人形,因而得名。蓝色光辉来自年轻恒星照亮并被周围尘埃散射的星光。它常与南侧的 M42 同框拍摄,形成红蓝相邻的冷暖色调对比。它视星等约 7 等,是猎户座区域中上镜而易拍的反射星云。"
  descriptionEn: "The Running Man Nebula (Sh2-279) lies about 1,500 light-years away just north of the Orion Nebula, part of the same Orion complex. It is chiefly a blue reflection nebula with a small embedded red emission patch, and its dark dust traces the shape of a running figure, hence the name. The blue glow is starlight from young stars scattered by surrounding dust. It is often framed with M42 to the south, creating a cool-warm contrast of adjacent blue and red. At magnitude 7 it is a photogenic and accessible reflection nebula in the Orion region."
  focal: "中长焦 800–1200mm"
  image: sh2279
