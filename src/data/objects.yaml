  summary: "银河系第二大卫星星系。"
  summaryEn: "The Milky Way's second-largest satellite galaxy, naked-eye in the south."
  description: "小麦哲伦云距地球约 20 万光年,是银河系的一个不规则矮卫星星系,南天肉眼可见为一片细长的云状光斑,横跨杜鹃座与水蛇座。它的真实直径约 1.9 万光年,视面达 4° 以上,内含数亿颗恒星以及众多发射星云与星团。它与大麦哲伦云、银河系之间存在引力潮汐相互作用,正被逐渐撕扯并拖出一条「麦哲伦流」气体桥。它在天空中与壮丽的前景球状星团杜鹃座 47(实际位于银河系内)紧邻同框,构成南天摄影的经典构图。广角镜头下尤为上镜,是南半球深空巡礼的必拍目标。"
  descriptionEn: "The Small Magellanic Cloud lies about 200,000 light-years away and is an irregular dwarf satellite galaxy of the Milky Way, visible to the naked eye as an elongated cloud spanning Tucana and Hydrus. Roughly 19,000 light-years across and over 4° in apparent size, it contains hundreds of millions of stars along with many emission nebulae and clusters. Gravitational interaction with the Large Magellanic Cloud and our Galaxy is tearing it apart and drawing out the Magellanic Stream. In the sky it sits beside the brilliant foreground globular cluster 47 Tucanae, forming a classic southern composition. It is highly photogenic in wide-field shots and a must-image target from the southern hemisphere."
  focal: "广角 24–135mm"
  image: smc
