  summary: "轮廓酷似北美大陆的巨型红云。"
  summaryEn: "Huge red emission cloud shaped like the North American continent in Cygnus."
  description: "北美洲星云(NGC 7000)距地球约 2600 光年,位于天鹅座天津四附近的银河之中,因整体轮廓酷似北美大陆而得名,其中标志性的「墨西哥湾」由前景的暗尘带 LDN 935 勾勒。它视面积比满月大十倍,是天空中最大的发射星云之一,以红色氢发射为主。它与隔着同一条暗尘带的鹈鹕星云(IC 5070)实为同一片巨大电离氢云,可能由天津四或某颗隐藏的高温恒星照亮。表面亮度适中,适合广角连同银河同拍,也可用窄带凸显细节,是夏季天鹅座最上镜的大视场目标。"
  descriptionEn: "The North America Nebula (NGC 7000) lies about 2,600 light-years away in the Milky Way of Cygnus near Deneb, named for an outline resembling the North American continent, with its signature \"Gulf of Mexico\" carved by the foreground dark dust band LDN 935. Covering ten times the area of the full moon, it is one of the sky's largest emission nebulae, dominated by red hydrogen emission. It and the Pelican Nebula (IC 5070) across the same dust lane are actually one vast ionized hydrogen cloud, likely lit by Deneb or a hidden hot star. Of moderate surface brightness, it suits wide-field imaging alongside the Milky Way or narrowband work to bring out detail, making it Cygnus's most photogenic large-field summer target."
  focal: "广角/中焦 135–400mm"
  image: ngc7000
