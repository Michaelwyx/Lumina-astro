  difficulty: intermediate
  summary: "富含变星的明亮球状星团。"
  summaryEn: "A bright, rich globular cluster famous for its many RR Lyrae variables."
  description: "M3 距地球约 3.4 万光年,位于猎犬座,是天空中最明亮、星数最多的球状星团之一,包含约 50 万颗恒星。它以拥有数百颗(已确认约 274 颗)天琴座 RR 型变星而著称,数量在所有球状星团中名列前茅,这些标准烛光对测定宇宙距离意义重大。它年龄约 115 亿年,结构对称、核心高度密集明亮,边缘星点逐渐散开。它视星等约 6.2,双筒镜中即可见为模糊光斑,中等口径望远镜可分解出外围成员星。它是春季夜空中长焦摄影的人气球团,适合长焦高分辨拍摄。"
  descriptionEn: "M3 lies about 34,000 light-years away in Canes Venatici and is one of the brightest, richest globular clusters in the sky, containing roughly 500,000 stars. It is famous for its hundreds of RR Lyrae variables (about 274 confirmed), among the most of any globular, standard candles vital for measuring cosmic distances. Around 11.5 billion years old, it is symmetric with a densely concentrated, bright core whose stars thin out toward the edges. At magnitude 6.2 it shows as a fuzzy patch in binoculars, while medium telescopes resolve its outer stars. It is a popular long-focus globular of the spring sky, rewarding high-resolution imaging."
  focal: "长焦 1000mm+"
  image: m3
