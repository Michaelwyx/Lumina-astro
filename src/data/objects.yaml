  magnitude: 10.5
  hemisphere: both
  season: spring
  difficulty: advanced
  summary: "两星系正面碰撞,拖出长长触须。"
  summaryEn: "A pair of colliding galaxies flinging out long tidal \"antennae\" of stars."
  description: "触须星系(NGC 4038/4039,Caldwell 60/61)距地球约 4500 万光年,位于乌鸦座,是一对正在剧烈并合的星系,堪称研究星系碰撞的最经典样本。两个曾经独立的旋涡星系约六亿年前彼此穿越,猛烈的碰撞压缩气体云,点燃了爆发式的恒星形成,孕育出大量明亮的蓝色超星团。潮汐力还把恒星甩出星系外,拉出两条长长的恒星「触须」,得名由此而来。哈勃影像清晰展现了核心碰撞区与众多新生星团。长焦深曝能同时记录核心碰撞区与外延的触须,极具动感。"
  descriptionEn: "The Antennae Galaxies (NGC 4038/4039, Caldwell 60/61) lie about 45 million light-years away in Corvus and are a pair of violently merging galaxies, the classic showcase for studying galactic collisions. The two once-separate spirals passed through each other roughly 600 million years ago, and the violent encounter compressed gas clouds to ignite a burst of star formation, spawning many bright blue super star clusters. Tidal forces have flung stars beyond the galaxies into two long stellar \"antennae,\" giving the pair its name. Hubble imagery clearly shows the colliding cores and numerous newborn clusters. Long-focal deep exposures capture both the central collision zone and the extended antennae, conveying real dynamism."
  focal: "长焦 1500mm+"
  image: ngc4038
