  difficulty: intermediate
  summary: "絮状旋臂密集缠绕,状如向日葵。"
  summaryEn: "Flocculent spiral with petal-like arms resembling a sunflower."
  description: "向日葵星系距地球约 2700 万光年,位于猎犬座,属于絮状旋涡星系。它没有连贯的宏伟旋臂,而是由众多短而密集的旋臂段缠绕成花瓣状,因而得名向日葵。它是 M51 星系群的成员之一,黄色核球与遍布蓝色星团、尘埃斑的盘面对比鲜明。深度曝光还能拍出环绕星系的暗弱恒星流,那是它过去吞并矮星系留下的潮汐残骸。长焦下纹理细腻、质感丰富,是春季猎犬座区域颇受欢迎的星系。"
  descriptionEn: "The Sunflower Galaxy lies about 27 million light-years away in Canes Venatici and is a flocculent spiral. Instead of grand sweeping arms, it has many short, tightly wound arm segments knit into a petal-like pattern, hence its name. A member of the M51 group, it contrasts a golden bulge against a disk peppered with blue clusters and dust patches. Deep exposures reveal faint stellar streams encircling it, tidal remnants of dwarf galaxies it has absorbed. Finely textured at long focal lengths, it is a popular spring galaxy in Canes Venatici."
  focal: "长焦 1000mm+"
  image: m63-sunflower
