  description: "M10 距地球约 14000 光年,是蛇夫座一个明亮的球状星团,直径约 80 光年。它核心致密、外缘恒星渐疏,在中等口径中即可分解出大量成员。常与邻近的 M12 同框出现在蛇夫座宽视场中。长焦拍摄能将密集的金色星点逐一分辨,是夏季的经典球状星团目标。"
  descriptionEn: "About 14,000 light-years away, M10 is a bright globular cluster in Ophiuchus roughly 80 light-years across. With a dense core fading to scattered outer stars, it resolves into many members in modest apertures. It often appears with the nearby M12 in a wide Ophiuchus field. Long-focal imaging resolves the dense golden stars individually, a classic summer globular target."
