  summaryEn: "A rich open cluster shaped like a flight of ducks."
  description: "野鸭星团 M11 距地球约 6200 光年,位于盾牌座银河浓密处,是已知最丰富、最致密的疏散星团之一,包含近 3000 颗恒星。其明亮成员排成 V 字形,似一群飞翔的野鸭而得名。背景银河繁星密布,中焦拍摄能呈现星团与银河尘埃的丰富层次,是夏季上镜的疏散星团。"
  descriptionEn: "About 6,200 light-years away in a dense part of the Scutum Milky Way, the Wild Duck Cluster (M11) is one of the richest and most compact open clusters known, with nearly 3,000 stars. Its bright members form a V-shape resembling a flight of ducks. Against a star-strewn Milky Way background, mid-focal imaging shows rich layering of cluster and dust, a photogenic summer open cluster."
