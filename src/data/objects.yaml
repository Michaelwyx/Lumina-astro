  description: "NGC 6914 距地球约 6000 光年,位于天鹅座 γ 星附近的广阔发射星云带中。它是一组蓝色反射星云,被年轻炽热恒星照亮,镶嵌在大片红色氢发射背景与暗尘埃之上,蓝红对比鲜明。需结合宽带与 H-alpha 才能同时呈现反射的蓝与发射的红,是夏季富色彩的进阶目标。"
  descriptionEn: "About 6,000 light-years away near Gamma Cygni's broad emission complex, NGC 6914 is a group of blue reflection nebulae lit by hot young stars and set against a large red hydrogen background laced with dark dust. Combining broadband and H-alpha is needed to render both the reflected blue and emitted red, a colorful advanced summer target."
