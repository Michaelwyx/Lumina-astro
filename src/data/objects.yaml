  summary: "红色辉光前的标志性马头剪影。"
  summaryEn: "Glowing red emission ridge behind the iconic Horsehead silhouette."
  description: "IC 434 是猎户座参宿一附近一条明亮的红色氢发射带,距地球约 1500 光年,由附近的炽热恒星 σ Orionis 电离产生。著名的马头星云(暗星云 Barnard 33)正是衬托在这片红色辉光前形成的剪影。这条发射带是更庞大的猎户座分子云复合体的一部分,内部仍在孕育新恒星。它的红光来自氢原子的 Hα 谱线,使整个区域在窄带或彩色长曝下呈现浓郁的玫红色。常与下方的火焰星云 NGC 2024 同框,是冬季猎户座最经典也最具挑战的拍摄目标之一。"
  descriptionEn: "IC 434 is a bright ridge of glowing hydrogen near Alnitak in Orion, about 1,500 light-years away, ionized by the nearby hot star Sigma Orionis. The famous Horsehead Nebula (dark nebula Barnard 33) is silhouetted against this red glow. The ridge belongs to the vast Orion molecular cloud complex and is still forming new stars. Its red color comes from the hydrogen-alpha line, giving the whole region a deep rose hue in long exposures. Often framed with the Flame Nebula below, it is one of winter Orion's most iconic yet challenging targets."
  focal: "中长焦 800–1200mm"
  image: horsehead
