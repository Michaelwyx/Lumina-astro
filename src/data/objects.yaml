  summary: "南天明亮的疏散星团。"
  summaryEn: "Bright nearby open cluster, the southern counterpart to the Pleiades."
  description: "南昴星团(IC 2602,又称南天宝盒或船底座θ星团)距地球约 480 光年,位于船底座,是一个明亮而年轻的疏散星团。它因显眼程度堪比北天的昴星团而得名南昴星团,以全天第三亮的疏散星团位列其中。以其最亮成员、二等星船底座θ为首,群星散布在约一度的天区内,肉眼清晰可见。星团年龄约三千万年,含数十颗炽热的蓝白色恒星。它视面大、星点明亮,是南半球春季宽场与广角摄影的人气目标。"
  descriptionEn: "The Southern Pleiades (IC 2602, anchored by Theta Carinae) lies about 480 light-years away in Carina, a bright, young open cluster. It earns its name by rivaling the northern Pleiades in prominence and ranks among the brightest open clusters in the sky. Led by its brightest member, the 2nd-magnitude star Theta Carinae, its stars scatter across about a degree of sky and are easily seen with the naked eye. Around 30 million years old, it holds a few dozen hot blue-white stars. Large in angular size with bright stars, it is a popular wide-field target in the southern spring sky."
  focal: "中焦 400–800mm"
  image: c94
