  season: spring
  difficulty: advanced
  summary: "扭曲星暴星系拖着小伴星系。"
  summaryEn: "A tidally disturbed starburst galaxy towing the small companion NGC 4485."
  description: "茧状星系距地球约 2500 万光年,位于猎犬座,是一个被引力扰动而剧烈造星的星暴星系。它正与一个较小的伴星系 NGC 4485 相互作用,二者间有一条由恒星与气体构成的桥相连,潮汐力将主星系拉扯成一头大、一头尖的茧状不规则外形,因而得名。强烈的恒星形成使其旋臂泛蓝并布满红色 H II 区,核区还向晕中喷出富含氢的气体。它扭曲不规则的外形极富动感,是研究星系相互作用与星暴的良好样本。长焦深曝可同时记录主星系、伴星系与连接桥。"
  descriptionEn: "The Cocoon Galaxy lies about 25 million light-years away in Canes Venatici and is a tidally disturbed galaxy undergoing vigorous starburst activity. It is interacting with the smaller companion NGC 4485, linked by a bridge of stars and gas, with tidal forces stretching the main galaxy into a cocoon-like irregular shape—broad at one end, tapered at the other—that gives it its name. Intense star formation turns its arms blue and fills them with red H II regions, while the core drives hydrogen-rich gas out into the halo. Its warped, irregular form is full of dynamism, a fine sample for studying galaxy interaction and starbursts. Deep long-focus imaging captures the main galaxy, companion and connecting bridge together."
  focal: "长焦 1000mm+"
  image: ngc4490
- id: NGC4565
