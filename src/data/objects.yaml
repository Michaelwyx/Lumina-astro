  summary: "最亮最大的行星状星云之一。"
  summaryEn: "The brightest, largest planetary nebula, the first ever discovered."
  description: "哑铃星云(M27,NGC 6853)距地球约 1360 光年,位于狐狸座,是天空中最亮、视面最大的行星状星云,也是 1764 年梅西耶发现的、人类记录的第一个行星状星云。它由一颗垂死的恒星抛出的气壳构成,呈双瓣的哑铃(或苹果核)形状,正面对着我们。星云呈青绿色的氧 III 与红粉色的氢双色调,中心是一颗正逐渐冷却的炽热白矮星。它表面亮度高、易于观测和拍摄,是入门行星状星云摄影的理想目标,长焦下色彩与对称结构尤为迷人。"
  descriptionEn: "The Dumbbell Nebula (M27, NGC 6853) lies about 1,360 light-years away in Vulpecula and is the brightest, largest planetary nebula in the sky, as well as the first ever recorded, discovered by Messier in 1764. Built from the gas shell cast off by a dying star, it shows a two-lobed dumbbell (or apple-core) shape presented face-on. The nebula glows in twin tones of teal O III and red-pink hydrogen, with a hot, slowly cooling white dwarf at its center. High in surface brightness and easy to observe and image, it is an ideal beginner's planetary-nebula target, its color and symmetric structure especially captivating at long focal lengths."
  focal: "长焦 1000mm+"
  image: m27-dumbbell
