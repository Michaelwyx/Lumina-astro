  season: summer
  difficulty: intermediate
  summary: "面纱星云中央的三角丝带。"
  summaryEn: "The faint triangular filaments at the heart of the Cygnus Loop."
  description: "皮克林三角是天鹅座环超新星遗迹中央偏北的一片较暗的三角形丝状结构,距地球约 2400 光年,位于天鹅座。它得名于哈佛天文台台长爱德华·皮克林,实际由其助手威廉敏娜·弗莱明在底片上发现。它连接着东、西面纱星云,与它们同属约一万多年前一颗大质量恒星爆发的遗迹,呈现纤细的红色氢与青色氧激波丝。它表面亮度较低,在三段面纱结构中最为暗淡,是宽场拍摄整个天鹅座环时不可或缺的中段细节。它适合中焦镜头配合窄带滤镜,在暗夜下长曝呈现其精细丝状结构。"
  descriptionEn: "Pickering's Triangle is a fainter triangular patch of filaments north of center in the Cygnus Loop supernova remnant, lying about 2,400 light-years away in Cygnus. It is named for Harvard Observatory director Edward Pickering, though it was actually discovered on photographic plates by his assistant Williamina Fleming. It bridges the Eastern and Western Veil and shares their origin in a massive star that exploded over 10,000 years ago, showing delicate red hydrogen and cyan oxygen shock filaments. With the lowest surface brightness of the three Veil sections, it is an essential middle piece when imaging the whole Cygnus Loop wide-field. It suits a medium focal length with narrowband filters and long exposures under dark skies to reveal its fine filamentary structure."
  focal: "中焦 400–800mm"
