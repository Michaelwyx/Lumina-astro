  summary: "轮廓如心的巨大红色星云。"
  summaryEn: "A vast heart-shaped emission nebula sculpted by the cluster Melotte 15."
  description: "心形星云距地球约 7500 光年,位于仙后座,因整体轮廓酷似一颗心而得名,实际跨度超过 200 光年。它的中央坐落着年轻疏散星团 Melotte 15,团中几颗大质量 O 型恒星以强烈的星风与辐射雕琢出标志性的尘埃柱、亮边与中央空腔。星云主体由被电离的氢气发出深红色辉光,在窄带影像中层次极其丰富。它常与东侧、形似人脑的胚胎星云(灵魂星云 IC 1848)组成「心与灵魂」星云对。作为宽场窄带摄影的人气目标,它适合用中焦镜头连同周边星场一同记录。"
  descriptionEn: "The Heart Nebula lies about 7,500 light-years away in Cassiopeia and is named for its overall heart-like outline, spanning more than 200 light-years. At its center sits the young open cluster Melotte 15, whose massive O-type stars carve the signature dust pillars, bright rims and central cavity with their fierce winds and radiation. The nebula's body glows deep red from ionized hydrogen and reveals rich structure in narrowband imaging. It is often paired with the brain-shaped Soul Nebula (IC 1848) to its east as the 「Heart and Soul.」 A favorite for wide-field narrowband work, it suits a medium focal length that captures it alongside the surrounding star field."
  focal: "广角/中焦 135–400mm"
  image: heart-nebula
