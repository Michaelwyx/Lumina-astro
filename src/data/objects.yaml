  difficulty: advanced
  summary: "侧向旋涡,深曝显现潮汐恒星流。"
  summaryEn: "Edge-on Virgo spiral wreathed in faint tidal stellar streams."
  description: "NGC 4216 距地球约 4000 万光年,位于室女座,是室女座星系团中一个明亮的侧向中介型旋涡星系。它的盘面有清晰的暗尘埃带,核球明亮硕大。深度曝光揭示出它正吞并周围矮星系而产生的多条巨大潮汐恒星流,如幽灵般缠绕在星系周身,使它成为研究星系等级式生长的绝佳样本。它在室女团中亮度较高,常与邻近的两个侧向星系同框。它是研究星系吸积与并合的人气深空摄影目标。"
  descriptionEn: "NGC 4216 lies about 40 million light-years away in Virgo, a bright edge-on intermediate spiral in the Virgo cluster. Its disk shows a clear dark dust lane and a large, bright bulge. Deep exposures reveal multiple giant tidal stellar streams from dwarf galaxies it is absorbing, wreathing the galaxy like ghosts and making it an excellent example of hierarchical galaxy growth. Among the brighter members of the Virgo cluster, it often shares the frame with two neighboring edge-on galaxies. It is a popular deep-sky target for studying galactic accretion and merging."
  focal: "长焦 1000mm+"
  image: ngc4216
