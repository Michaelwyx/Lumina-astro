  summaryEn: "A large open cluster paired with compact NGC 2158."
  description: "M35 距地球约 2800 光年,位于双子座足部,是一个明亮而舒展的大型疏散星团,肉眼可见为一片朦胧光斑。它最迷人之处是旁边一个更古老、更致密、更遥远的小星团 NGC 2158,二者大小与密度对比鲜明,同框极具观赏性。中焦广视场即可完美收纳,是冬季人气星团。"
  descriptionEn: "About 2,800 light-years away at the foot of Gemini, M35 is a bright, sprawling open cluster visible to the naked eye as a hazy patch. Its charm lies in the nearby older, denser, more distant cluster NGC 2158, whose striking contrast in size and density makes a captivating pair. A mid-focal wide field frames both perfectly, a popular winter cluster."
