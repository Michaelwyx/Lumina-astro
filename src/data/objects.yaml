  summary: "北半球可见最亮的球状星团之一。"
  summaryEn: "One of the nearest, brightest globular clusters, set in the Sagittarius Milky Way."
  description: "M22 距地球约 1 万光年,位于人马座,是离我们最近、最明亮的球状星团之一,也是最早被发现的球状星团(1665 年)。它视面大、视星等约 5.1,在黑暗天空下肉眼可见为模糊光斑,星点稀疏明亮、容易分解。它是少数已知内含行星状星云的球状星团之一,还可能藏有两个恒星级黑洞。它镶嵌在人马座密集的银河背景中,周围繁星点点。由于位于黄道附近,行星偶尔会从其附近经过。它是夏季长焦摄影的人气目标,适合在南天地平较高时拍摄。"
  descriptionEn: "M22 lies about 10,000 light-years away in Sagittarius and is one of the nearest and brightest globular clusters, as well as one of the first discovered (1665). Large in apparent size at magnitude 5.1, it is visible to the naked eye as a fuzzy patch under dark skies and its bright, loosely packed stars are easy to resolve. It is one of the few globulars known to contain a planetary nebula and may also host two stellar-mass black holes. It is embedded in the rich Sagittarius Milky Way, surrounded by dense star fields, and lying near the ecliptic it is occasionally passed by planets. It is a popular summer long-focus target, best shot when high above the southern horizon."
  focal: "长焦 1000mm+"
