  difficulty: advanced
  summary: "不对称棒旋,旋臂松散布满星云。"
  summaryEn: "An asymmetric nearby barred spiral with loose, star-forming arms."
  description: "NGC 925 距地球约 3000 万光年,位于三角座,是一个外形不对称的中型棒旋星系。它的中央恒星棒一端连接着一条较显著的旋臂,另一端则较为松散凌乱,整体结构松散,是「SBd」型晚期棒旋的典型代表。盘面上散布着粉红色 H II 区与蓝色年轻星团,显示出活跃的恒星形成。它属于本星系群外围、邻近的 NGC 1023 星系群,曾被哈勃望远镜用作测定造父变星周光关系、标定哈勃常数的重要目标。表面亮度偏低,是秋季三角座中值得长曝光的近邻旋涡。"
  descriptionEn: "NGC 925 lies about 30 million light-years away in Triangulum and is a mid-sized, asymmetric barred spiral. One end of its central bar connects to a more prominent arm while the other trails off loosely, giving an overall ragged structure typical of a late-type SBd barred spiral. Its disk is dotted with pink H II regions and blue young clusters, signs of active star formation. A member of the nearby NGC 1023 Group on the fringe of the Local Group, it was an important Hubble Space Telescope target for calibrating the Cepheid period-luminosity relation and the Hubble constant. Low in surface brightness, it is a rewarding nearby spiral for long exposures in the autumn Triangulum sky."
  focal: "长焦 1000mm+"
  image: ngc925
