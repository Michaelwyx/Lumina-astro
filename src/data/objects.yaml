  summary: "马头剪影本体的暗星云编号。"
  summaryEn: "Dark dust forming the iconic Horsehead silhouette against IC 434's red glow."
  description: "马头星云的暗尘本体在巴纳德暗星云表中编号为 B33,距地球约 1500 光年,位于猎户座参宿一(Alnitak)东南方。它是一团致密的冷分子尘埃,本身不发光,只因衬在 IC 434 明亮的红色氢发射带前才显出形如马头的剪影。这团尘埃属于规模庞大的猎户座分子云复合体,内部正孕育着新恒星,顶部边缘已被附近高温恒星的紫外辐射逐渐侵蚀。它是天空中最著名、最具辨识度的暗星云,几乎总与背后的红色辉光同框出现。拍摄时常将其与下方的火焰星云(NGC 2024)一并收入,是猎户座最经典也颇具挑战的目标之一。"
  descriptionEn: "Barnard 33 is the catalog designation for the dark dust that forms the Horsehead Nebula, lying about 1,500 light-years away southeast of Alnitak in Orion. This dense column of cold molecular dust gives off no light of its own; it shows up only as a horse-head silhouette against the bright red hydrogen emission of IC 434 behind it. It belongs to the vast Orion Molecular Cloud Complex, with new stars forming inside while its crest is slowly eroded by ultraviolet radiation from nearby hot stars. It is among the most recognizable dark nebulae in the entire sky, almost always imaged together with that red backdrop. Photographers usually frame it alongside the Flame Nebula (NGC 2024) below, making it one of Orion's most classic yet demanding targets."
  focal: "中长焦 800–1200mm"
  image: b33
