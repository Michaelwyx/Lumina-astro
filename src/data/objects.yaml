  summary: "群星排列如圣诞树的星团。"
  summaryEn: "Stars arranged like a Christmas tree, pointing toward the Cone Nebula."
  description: "圣诞树星团是疏散星团 NGC 2264 的星团部分,距地球约 2700 光年,位于麒麟座。它因明亮成员星的排布形似一棵倒置的圣诞树而得名,树尖正对着南方的锥状星云(Cone Nebula)。星团年龄仅约数百万年,内部恒星仍在形成,最亮的麒麟座 S 星位于「树干」基部。它嵌在红色的发射星云与蓝色的狐皮反射星云中,周围还有著名的雪人星云。它是冬季麒麟座区域上镜的星团与星云组合,适合中长焦窄带或宽带拍摄,以同时呈现星团与周边星云的丰富结构。"
  descriptionEn: "The Christmas Tree Cluster is the cluster portion of NGC 2264, lying about 2,700 light-years away in Monoceros. It is named for the way its bright stars trace an inverted Christmas tree, whose tip points toward the Cone Nebula to the south. Only a few million years old, the cluster is still forming stars, with the bright S Monocerotis at the base of the 「trunk.」 It is set within red emission nebulosity and the blue Fox Fur reflection nebula, near the famous Snowflake region. A photogenic cluster-and-nebula combination in the winter Monoceros field, it suits medium-to-long focal lengths in narrowband or broadband to capture both the cluster and the rich surrounding nebulae."
  focal: "中长焦 800–1200mm"
