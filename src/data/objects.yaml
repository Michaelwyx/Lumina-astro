  descriptionEn: "About 4,100 light-years away, M36 is one of Auriga's three prominent open clusters, dominated by young, bright blue-white stars. Compact with hot members, it stands out vividly against the Milky Way. It often appears with M37 and M38 in wide-field compositions of the Auriga Milky Way, and mid-focal imaging cleanly shows its blue stars, a common winter cluster."
