  summary: "拖着触须的水母状超新星遗迹。"
  summaryEn: "Jellyfish-shaped supernova remnant trailing filamentary tendrils."
  description: "水母星云距地球约 5000 光年,位于双子座,是一处约三万年前爆发的超新星遗迹。它因弧形的激波带拖着丝状的「触须」、整体形似一只水母而得名。爆发抛出的气体仍在以高速膨胀,与周围星际介质碰撞激波,产生红色的氢与青绿色的氧发射丝。遗迹中心据信留有一颗中子星。它视星等约 12 等,表面亮度低、目视极难。窄带拍摄会呈现层次分明的激波细丝,是冬季双子座中富有挑战又极上镜的窄带目标。"
  descriptionEn: "The Jellyfish Nebula lies about 5,000 light-years away in Gemini, a supernova remnant from an explosion roughly 30,000 years ago. It is named for its arc-shaped shock front trailing filamentary 'tendrils,' giving it the look of a jellyfish. Gas flung out by the blast still expands at high speed, shocking against the surrounding interstellar medium to produce red hydrogen and teal oxygen filaments. A neutron star is thought to remain at its center. At magnitude 12 its low surface brightness makes it very hard visually. Narrowband imaging reveals finely layered shock filaments, making it a challenging yet highly photogenic winter target in Gemini."
  focal: "中长焦 800–1200mm"
  image: ic443
