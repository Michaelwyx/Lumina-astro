  typeLabel: "旋涡星系"
  constellation: "飞马座 Peg"
  ra: "22h37m"
  dec: 34
  decLabel: "+34°"
  magnitude: 9.5
  hemisphere: north
  season: autumn
  difficulty: advanced
  summary: "银河系样板,身后伴有一群远方星系。"
  summaryEn: "A tilted Milky Way look-alike spiral with a deer of distant background galaxies."
  description: "NGC 7331 距地球约 4000 万光年,位于飞马座,是一个高度倾斜的大旋涡星系,因外形酷似银河系而常被称为「银河系样板」。它明亮的黄色核球前方散布着清晰的尘埃带,核球异常明亮,内部存在反向旋转的恒星盘。它的视线方向上还散布着四个遥远得多的小星系(常被合称为「鹿群」),营造出真实的深空距离层次。著名的致密星系群史蒂芬五重奏就在其附近半度内,可一并入画。一框之内远近星系成群,极具深空层次感,是秋季长焦星系摄影的人气目标。"
  descriptionEn: "NGC 7331 lies about 40 million light-years away in Pegasus and is a highly inclined large spiral often called a 「Milky Way analog」 for its resemblance to our Galaxy. Clear dust lanes lie in front of its bright yellow bulge, which is unusually luminous and contains a counter-rotating inner stellar disk. Along the same line of sight scatter four far more distant background galaxies (collectively nicknamed the 「Deer Lick Group」), creating a real sense of deep-space depth. The famous compact group Stephan's Quintet sits within half a degree and can share the frame. With near and far galaxies grouped in one field, it offers striking deep-sky depth and is a popular autumn long-focus galaxy target."
  focal: "长焦 1000mm+"
  image: ngc7331
