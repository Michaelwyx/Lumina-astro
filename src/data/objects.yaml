  summary: "点亮玫瑰星云的年轻星团。"
  summaryEn: "Young cluster powering and hollowing out the Rosette Nebula."
  description: "NGC 2244 是位于玫瑰星云中心的疏散星团,距地球约 5200 光年,年龄仅约两百万年,十分年轻。星团中炽热的 O 型与 B 型恒星释放出强烈的紫外辐射与恒星风,电离并吹空了周围的气体,从而塑造出玫瑰星云标志性的中央空腔与花环造型。它含数十颗成员星,其中几颗是质量极大的蓝白色亮星。明亮的成员星与红色背景星云对比鲜明,肉眼即可见到星团本身。它是冬季麒麟座中焦摄影的人气目标,常与整个玫瑰星云一同入镜。"
  descriptionEn: "NGC 2244 is the open cluster at the heart of the Rosette Nebula, about 5,200 light-years away and very young at only about two million years old. Its hot O- and B-type stars pour out intense ultraviolet radiation and stellar winds, ionizing and blowing out the surrounding gas to sculpt the Rosette's signature central cavity and ring. It holds a few dozen members, including several very massive blue-white luminaries. Its bright stars contrast sharply with the red background nebula, and the cluster itself is visible to the naked eye. It is a popular winter mid-focal-length target in Monoceros, usually framed with the whole Rosette."
  focal: "中焦 400–800mm"
