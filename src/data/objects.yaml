  summary: "天蝎尾部肉眼可见的亮星团。"
  summaryEn: "A bright naked-eye open cluster in the Scorpion's tail, noted by Ptolemy."
  description: "托勒密星团距地球约 980 光年,位于天蝎座尾部,是一个明亮的疏散星团,早在公元 130 年就被古希腊天文学家托勒密记录下来,因而得名,是有记载最早被识别的星团之一。它视星等约 3.3,视面达 1.3°(约满月的两倍多),肉眼下是天蝎尾部一团显眼的星群。它包含约 80 颗恒星,年龄约 2 亿年,以蓝白色亮星为主。它镶嵌在人马座方向密集的银河背景中,周围繁星与暗尘交织。它是南天夏季宽场摄影的上佳对象,适合广角到中焦拍摄,展现星团与银河的整体景观。"
  descriptionEn: "The Ptolemy Cluster lies about 980 light-years away in the tail of Scorpius and is a bright open cluster recorded as early as 130 AD by the Greek astronomer Ptolemy, giving it its name as one of the earliest star clusters ever identified. At magnitude 3.3 and spanning 1.3° (over twice the Moon's width), it is a conspicuous knot of stars to the naked eye in the Scorpion's tail. It contains roughly 80 stars about 200 million years old, dominated by blue-white luminaries. Embedded in the rich Milky Way toward Sagittarius, it is interwoven with dense star fields and dark dust. It is an excellent southern summer wide-field subject, suiting wide-angle to medium focal lengths that frame the cluster within the Milky Way."
  focal: "广角/中焦 135–400mm"
  image: m7
