  difficulty: advanced
  summary: "侧向旋涡,厚尘埃带状如汉堡。"
  summaryEn: "Edge-on spiral with a thick dust lane and a long tidal tail."
  description: "汉堡星系距地球约 3500 万光年,位于狮子座,是「狮子三重奏」的第三位成员,与 M65、M66 同框。它以完全侧向的盘面和一道贯穿中央、略带膨出的厚尘埃带而得名,形似夹层汉堡。它拖着一条长达约三十万光年、由邻近星系潮汐作用拉出的暗弱恒星流,从盘面一端伸出。这条壮观的潮汐尾是星系间引力扰动的直接证据。它视星等约 9.5 等,深度曝光才能记录下完整的潮汐尾,是春季狮子座中富有挑战的长焦目标。"
  descriptionEn: "The Hamburger Galaxy lies about 35 million light-years away in Leo, the third member of the Leo Triplet alongside M65 and M66. It is named for its fully edge-on disk crossed by a thick, slightly bulging central dust lane, resembling a layered hamburger. It trails a faint stellar stream roughly 300,000 light-years long, drawn out by tidal interaction with its neighbors and extending from one end of the disk. This spectacular tidal tail is direct evidence of gravitational disturbance between galaxies. At magnitude 9.5, deep exposures are needed to record the full tail, making it a challenging spring target in Leo."
  focal: "长焦 1000mm+"
  image: ngc3628
- id: NGC4038
