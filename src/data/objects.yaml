  summary: "本星系群第三大成员,旋臂遍布粉红星云。"
  summaryEn: "Third-largest Local Group galaxy, spiral arms dotted with pink nebulae."
  description: "三角座星系距地球约 270 万光年,是本星系群中第三大成员,仅次于仙女座大星系和银河系。它几乎完全面朝我们,展开的旋臂中布满粉红色 H II 区,其中巨大的 NGC 604 是本星系群中最大的恒星形成区之一,直径近 1500 光年。它与仙女座星系可能存在引力联系,在暗夜下肉眼勉强可见。它表面亮度较低、视面大,需要暗天与长曝光。中焦镜头深曝能拍出绚丽的恒星诞生地与蓝色星团,极具观赏性。"
  descriptionEn: "The Triangulum Galaxy lies about 2.7 million light-years away, the third-largest member of the Local Group after Andromeda and the Milky Way. It is nearly face-on, its sprawling arms studded with pink H II regions, including giant NGC 604, one of the largest star-forming regions in the Local Group at nearly 1,500 light-years across. It may be gravitationally linked to Andromeda and is faintly visible to the naked eye under dark skies. Its low surface brightness and large angular size demand dark skies and long exposures. Deep mid-focal-length imaging captures gorgeous stellar nurseries and blue clusters, making it highly rewarding."
  focal: "中焦 400–800mm"
  image: m33-triangulum
