  summary: "南天最美棒旋,旋臂红蓝交织。"
  summaryEn: "The southern sky's most spectacular face-on barred spiral, rich in star formation."
  description: "南风车星系(M83,NGC 5236)距地球约 1500 万光年,位于长蛇座,是南天最壮观的面朝我们的棒旋星系之一,又因外形得名「南风车」。它恒星形成异常活跃,旋臂上布满粉红色 H II 区与蓝色年轻星团,中心横亘一道明亮的恒星棒。过去一百年间它已爆发六颗超新星,是观测到超新星最多的星系之一,哈勃影像还揭示出近三百个超新星遗迹气泡。色彩饱满、结构清晰、视面较大,中焦即可拍出宏伟全貌,是南半球星系摄影最受欢迎的明星目标之一。"
  descriptionEn: "The Southern Pinwheel Galaxy (M83, NGC 5236) lies about 15 million light-years away in Hydra and is one of the southern sky's most spectacular face-on barred spirals. Star formation runs intensely high, with arms studded with pink H II regions and blue young clusters and a bright stellar bar crossing the center. Six supernovae have erupted in it over the past century, among the most of any galaxy, and Hubble imagery has revealed nearly 300 supernova-remnant bubbles. Saturated in color, clear in structure, and fairly large on the sky, it shows its grand sweep even at medium focal lengths, making it one of the most popular southern-hemisphere galaxy targets."
  focal: "中焦 600–1000mm"
