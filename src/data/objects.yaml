  descriptionEn: "About 17,000 light-years away, M55 is a large, loose globular cluster in Sagittarius with a relatively diffuse core, so even small telescopes resolve many of its members. Near the southern Milky Way it appears as an evenly spread field of golden stars with a large apparent size. A long-focal wide field captures its sprawling star sea, a rewarding summer southern globular target."
