  summary: "人马座中巨大明亮的红色恒星育婴室。"
  summaryEn: "A vast, bright red stellar nursery in Sagittarius split by a dark dust lane."
  description: "礁湖星云(M8,NGC 6523)是夏季银河中最壮观的发射星云之一,距地球约 4100 光年,位于人马座,横跨约三个满月的宽度。它明亮的红色氢气云被一条醒目的暗尘「礁湖」一分为二,故而得名。星云核心藏有沙漏状的高温恒星形成区(Hourglass),由炽热的 O 型恒星电离照亮,内部还镶嵌着年轻的疏散星团 NGC 6530。它表面亮度高、肉眼可见为一团朦胧光斑,是少数无需暗夜就能轻松观测的深空天体。常与邻近的三裂星云 M20 同框,是南天夏季最上镜的拍摄明星之一。"
  descriptionEn: "The Lagoon Nebula (M8, NGC 6523) is one of the most spectacular emission nebulae in the summer Milky Way, lying about 4,100 light-years away in Sagittarius and spanning roughly three full-moon widths. Its bright red hydrogen cloud is bisected by a prominent dark dust lane, the namesake \"lagoon.\" At its core lies the Hourglass, a hot star-forming region ionized by searing O-type stars, with the young open cluster NGC 6530 embedded nearby. High in surface brightness and visible to the naked eye as a hazy patch, it is one of the few deep-sky objects easily observed without dark skies. Often framed with the neighboring Trifid Nebula (M20), it is among the most photogenic stars of the southern summer sky."
  focal: "中焦 400–800mm"
  image: m8-lagoon
