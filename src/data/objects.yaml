  magnitude: 11
  hemisphere: north
  season: spring
  difficulty: advanced
  summary: "四星系紧凑成团,形态各异。"
  summaryEn: "A compact group of four interacting galaxies led by the warped spiral NGC 3190."
  description: "希克森致密星系群 44(HCG 44)距地球约 8000 万光年,位于狮子座,是天空中最显眼的致密星系群之一,由四个紧凑成团的星系组成。其中最大的成员是侧向旋涡 NGC 3190,它有一道明显弯曲、扭曲变形的暗尘带,显示出群内成员间的引力相互作用;同框的还有棒旋星系 NGC 3185、椭圆星系 NGC 3193 与旋涡 NGC 3187,形态各异。这些星系彼此距离很近,正经历潮汐扰动。一框之内多个星系互动,层次丰富,是致密星系群长焦摄影的精彩目标。它较暗,需要暗夜与长曝光。"
  descriptionEn: "Hickson Compact Group 44 (HCG 44) lies about 80 million light-years away in Leo and is one of the most striking compact galaxy groups in the sky, made of four closely clustered galaxies. Its largest member is the edge-on spiral NGC 3190, whose conspicuously bent and warped dust lane reveals gravitational interaction within the group; sharing the frame are the barred spiral NGC 3185, the elliptical NGC 3193 and the spiral NGC 3187, each different in form. Lying close together, these galaxies are undergoing tidal disturbance. With several interacting galaxies in a single frame, it is a richly layered, rewarding compact-group target for long-focus imaging. It is faint and needs dark skies and long exposures."
  focal: "长焦 1000mm+"
  image: ngc3190
