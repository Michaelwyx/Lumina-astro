  summary: "近侧向旋涡,盘面斑驳如冲浪板。"
  summaryEn: "A near-edge-on, mottled spiral resembling a surfboard, paired with M97."
  description: "M108 距地球约 4600 万光年,位于大熊座,是一个近乎侧向的旋涡星系。它细长的盘面上布满斑驳的暗尘埃云、明亮的恒星结与 H II 区,却缺乏明显的核球,整体形似一块漂浮的冲浪板。它属于大熊座星系云,内部恒星形成活跃,X 射线观测显示其拥有热气体晕。它与著名的行星状星云猫头鹰星云 M97 在天空中相距仅约 0.75°,二者可同框构图,是大熊座的经典搭配。它表面亮度较低,适合长焦镜头在暗夜下长曝,以呈现盘面的复杂纹理。"
  descriptionEn: "M108 lies about 46 million light-years away in Ursa Major and is a near-edge-on spiral galaxy. Its slender disk is mottled with dark dust clouds, bright stellar knots and H II regions yet lacks an obvious bulge, giving it the look of a floating surfboard. A member of the Ursa Major galaxy cloud, it shows active star formation and an X-ray-emitting halo of hot gas. It sits only about 0.75° from the famous Owl Nebula (M97) in the sky, so the two can share a frame as a classic Ursa Major pairing. Its low surface brightness rewards a long focal length and long exposures under dark skies to reveal the disk's complex texture."
  focal: "长焦 1000mm+"
