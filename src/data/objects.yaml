  description: "NGC 55 距地球约 650 万光年,位于玉夫座,是玉夫座星系群中离我们最近的成员之一。它呈侧向且高度不对称的棒旋形态,盘面散布着明亮的恒星结与红色 H II 区,明亮的核区偏向盘面一端,形态与大麦哲伦云相似。作为本星系群外的近邻,它视面积大、表面亮度高,中焦镜头即可拍出丰富纹理。深曝能记录到盘面中纵横的尘埃与点点恒星形成区。它是南天一个迷人而常被忽视的近邻星系。"
  descriptionEn: "NGC 55 lies about 6.5 million light-years away in Sculptor, one of the nearest members of the Sculptor galaxy group. It appears as a highly asymmetric, edge-on barred spiral, its disk strewn with bright stellar knots and red H II regions and its bright core offset toward one end, much like the Large Magellanic Cloud. As a close neighbor just outside the Local Group, it has a large angular size and high surface brightness, yielding rich texture even at medium focal lengths. Deep exposures capture crisscrossing dust and scattered star-forming regions across the disk. It is a charming and often overlooked southern neighbor."
  focal: "中焦 600–1000mm"
  image: ngc55
