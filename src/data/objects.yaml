  summary: "面纱星云东侧的丝状遗迹。"
  summaryEn: "The bright, lace-like eastern half of the Cygnus Loop supernova remnant."
  description: "东面纱星云(C33,NGC 6992)是天鹅座环超新星遗迹的东半部,距地球约 2400 光年,位于天鹅座。整个天鹅座环源自约一万至两万年前一颗大质量恒星的超新星爆发,膨胀的激波至今仍以每秒上百公里的速度扫过星际介质,被加热的气体发出纤细如蕾丝的丝状辉光。它呈红色氢与青色氧的双色调,前者来自较冷区域,后者来自高温激波前沿。整个遗迹视面达 6 个满月宽,而东面纱是其中最明亮、最细密的一段。窄带拍摄下细丝层次极为震撼,是夏秋之交的明星遗迹。"
  descriptionEn: "The Eastern Veil Nebula (C33, NGC 6992) is the eastern half of the Cygnus Loop supernova remnant, lying about 2,400 light-years away in Cygnus. The whole Cygnus Loop stems from the supernova of a massive star some 10,000 to 20,000 years ago, and its expanding shock still sweeps through the interstellar medium at hundreds of kilometers per second, the heated gas glowing in delicate, lace-like filaments. It shows twin tones of red hydrogen and teal oxygen, the former from cooler zones and the latter from the hot shock front. The full remnant spans six full-moon widths, and the Eastern Veil is its brightest, finest section. Narrowband imaging reveals stunning layers of filaments, making it a star remnant of late summer into autumn."
  focal: "中焦 400–800mm"
  image: c33
