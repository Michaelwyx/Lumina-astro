  summary: "形如木星的蓝绿行星状星云。"
  summaryEn: "A blue-green planetary nebula the size of Jupiter's disk."
  description: "木魂星云距地球约 4500 光年,是长蛇座一颗濒死恒星抛出的行星状星云。它呈明亮的蓝绿色椭圆双层结构,角径与木星圆面相近因而得名。中心白矮星清晰可见,周围环以暗淡的外晕。本体小而亮,需长焦高分辨率才能展现内外壳层,是春季的高放大率目标。"
  descriptionEn: "About 4,500 light-years away in Hydra, the Ghost of Jupiter is a planetary nebula ejected by a dying star. It shows a bright blue-green double-shell ellipse roughly the apparent size of Jupiter's disk, hence its name. The central white dwarf is clearly visible, surrounded by a faint outer halo. Small and bright, it needs long focal length and high resolution to show its shells, a spring high-magnification target."
  focal: "长焦 1500mm+"
  image: ngc3242
