  summary: "天炉座的双棒旋涡,棒旋典范。"
  summaryEn: "One of the largest, most archetypal barred spirals, a Seyfert in Fornax."
  description: "大棒旋星系距地球约 5600 万光年,位于天炉座,是天空中最大、最典型的棒旋星系之一,直径约 20 万光年。一条贯穿全盘的巨大恒星棒末端连接着两条优雅展开的旋臂,结构教科书般标准。它是天炉座星系团的成员,核心藏有一个约 200 万倍太阳质量、快速自转的超大质量黑洞,属于塞弗特活动星系。沿棒延伸的尘埃带将气体输送至核心,驱动着核区的恒星形成与黑洞活动。它结构清晰、棒旋分明,是棒旋星系摄影的标杆,适合长焦深曝展现旋臂与尘埃细节。"
  descriptionEn: "The Great Barred Spiral Galaxy lies about 56 million light-years away in Fornax and is one of the largest and most archetypal barred spirals in the sky, roughly 200,000 light-years across. A huge stellar bar spans the disk, its ends connecting to two elegantly sweeping arms in textbook-perfect form. A member of the Fornax Cluster, it harbors a fast-spinning supermassive black hole of about 2 million solar masses and is a Seyfert active galaxy. Dust lanes along the bar funnel gas toward the core, driving nuclear star formation and black-hole activity. With clear, well-defined bar-and-arm structure, it is the benchmark for barred-spiral imaging and rewards deep long-focus shots of its arm and dust detail."
  focal: "长焦 1000mm+"
  image: ngc1365
