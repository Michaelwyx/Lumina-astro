  </g>
  <!-- eyepiece -->
  <circle cx="7.2" cy="22.8" r="1.9" fill="#aebcff"/>
  <!-- the star it points to -->
  <path d="M25 5.6 l1 2.7 2.7 1 -2.7 1 -1 2.7 -1 -2.7 -2.7 -1 2.7 -1 z" fill="#dbe2ff"/>
