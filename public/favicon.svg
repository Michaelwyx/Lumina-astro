<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="拾光记 Lumina">
  <rect width="32" height="32" rx="7.5" fill="#13151d"/>
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- tripod -->
    <path d="M13 17 L10 26 M14 17.6 L17 26" stroke="#7b86b0" stroke-width="2"/>
    <!-- telescope tube -->
    <path d="M7.8 22.2 L20.2 9.8" stroke="#aebcff" stroke-width="4.2"/>
